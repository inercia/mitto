<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Viewer - Mitto</title>
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Highlight.js CSS (GitHub Dark theme) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css"
    />
    <!-- Light theme alternative (loaded dynamically based on preference) -->

    <style>
      :root {
        --bg-color: #0d1117;
        --header-bg: #161b22;
        --text-color: #c9d1d9;
        --text-secondary: #8b949e;
        --border-color: #30363d;
        --line-number-color: #6e7681;
        --line-number-bg: #161b22;
      }

      .light {
        --bg-color: #ffffff;
        --header-bg: #f6f8fa;
        --text-color: #24292f;
        --text-secondary: #57606a;
        --border-color: #d0d7de;
        --line-number-color: #6e7781;
        --line-number-bg: #f6f8fa;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
      }

      .header {
        background-color: var(--header-bg);
        border-bottom: 1px solid var(--border-color);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        z-index: 10;
      }

      .file-info {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .file-icon {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        color: var(--text-secondary);
      }

      .file-path {
        font-size: 14px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-size {
        font-size: 12px;
        color: var(--text-secondary);
        flex-shrink: 0;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 500;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        background-color: var(--header-bg);
        color: var(--text-color);
        cursor: pointer;
        transition: background-color 0.15s;
      }

      .btn:hover {
        background-color: var(--border-color);
      }
      .btn-primary {
        background-color: #dc2626;
        border-color: #dc2626;
        color: #fff;
      }
      .btn-primary:hover {
        background-color: #b91c1c;
      }
      .btn-icon {
        padding: 8px;
        gap: 0;
      }

      .btn svg {
        width: 16px;
        height: 16px;
      }

      /* Toggle button icons (hidden on large screens, shown on small) */
      .toggle-icon { display: none; width: 14px; height: 14px; flex-shrink: 0; }

      /* On small screens, hide button text labels — show icons only */
      @media (max-width: 640px) {
        .btn .btn-label { display: none; }
        .btn { gap: 0; padding: 6px 8px; }
        .toggle-btn .btn-label { display: none; }
        .toggle-btn { gap: 4px; }
        .toggle-icon { display: block; }
        .actions { gap: 4px; }
        .header { padding: 8px 12px; gap: 8px; }
        .file-size { display: none; }
      }

      .code-container {
        flex: 1;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      pre {
        margin: 0;
        padding: 0;
      }

      pre code {
        display: block;
        padding: 16px;
        font-family: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono",
          Menlo, monospace;
        font-size: var(--code-font-size, 13px);
        line-height: 1.5;
        tab-size: 4;
      }

      /* Line numbers */
      .hljs-ln {
        border-collapse: collapse;
      }

      .hljs-ln td {
        padding: 0;
      }

      .hljs-ln-numbers {
        user-select: none;
        text-align: right;
        color: var(--line-number-color);
        background-color: var(--line-number-bg);
        padding: 0 16px 0 16px;
        vertical-align: top;
        position: sticky;
        left: 0;
        border-right: 1px solid var(--border-color);
      }

      .hljs-ln-code {
        padding-left: 16px !important;
        width: 100%;
      }

      .loading,
      .error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 200px;
        color: var(--text-secondary);
      }

      .error {
        color: #f85149;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border-color);
        border-top-color: #58a6ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 12px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Markdown styles */
      .markdown-body {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
        line-height: 1.6;
      }
      .markdown-body h1, .markdown-body h2, .markdown-body h3,
      .markdown-body h4, .markdown-body h5, .markdown-body h6 {
        margin: 1.5em 0 0.5em;
        font-weight: 600;
      }
      .markdown-body h1 { font-size: 2em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
      .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
      .markdown-body h3 { font-size: 1.25em; }
      .markdown-body p { margin: 1em 0; }
      .markdown-body a { color: #58a6ff; text-decoration: none; }
      .light .markdown-body a { color: #0969da; }
      .markdown-body a:hover { text-decoration: underline; }
      .markdown-body code {
        font-family: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 0.875em;
        background: var(--header-bg);
        padding: 0.2em 0.4em;
        border-radius: 6px;
      }
      .markdown-body pre {
        background: var(--header-bg);
        padding: 1rem;
        overflow-x: auto;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        line-height: 1.5;
      }
      .markdown-body pre code { padding: 0; background: none; font-size: 0.85em; }
      .markdown-body blockquote {
        margin: 1em 0;
        padding: 0.5em 1em;
        border-left: 4px solid var(--border-color);
        color: var(--text-secondary);
        background: var(--header-bg);
      }
      .markdown-body ul, .markdown-body ol { margin: 1em 0; padding-left: 2em; }
      .markdown-body li { margin: 0.25em 0; }
      .markdown-body table { border-collapse: collapse; width: 100%; margin: 1em 0; }
      .markdown-body th, .markdown-body td { border: 1px solid var(--border-color); padding: 0.5em 1em; text-align: left; }
      .markdown-body th { background: var(--header-bg); font-weight: 600; }
      .markdown-body hr { border: none; border-top: 1px solid var(--border-color); margin: 2em 0; }
      .markdown-body img { max-width: 100%; }

      /* Mermaid diagram styles */
      .mermaid-diagram { display: flex; justify-content: center; margin: 1em 0; overflow-x: auto; }
      .mermaid-diagram svg { max-width: 100%; }

      /* Render/Source toggle */
      .toggle-group {
        display: inline-flex;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        overflow: hidden;
      }
      .toggle-btn {
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 500;
        border: none;
        background-color: var(--header-bg);
        color: var(--text-secondary);
        cursor: pointer;
        transition: background-color 0.15s, color 0.15s;
      }
      .toggle-btn:not(:last-child) { border-right: 1px solid var(--border-color); }
      .toggle-btn.active {
        background-color: var(--border-color);
        color: var(--text-color);
      }
      .toggle-btn:hover:not(.active) { background-color: color-mix(in srgb, var(--border-color) 50%, var(--header-bg)); }

      /* Rendered HTML iframe */
      .rendered-frame {
        width: 100%;
        border: none;
        min-height: 100%;
        background: white;
      }

      /* Bottom bar */
      .bottom-bar {
        background-color: var(--header-bg);
        border-top: 1px solid var(--border-color);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-shrink: 0;
        z-index: 10;
      }
      .bottom-bar .btn {
        padding: 8px 16px;
        font-size: 13px;
        border-radius: 8px;
      }

      /* Diff styles */
      .diff-container {
        padding: 0;
        font-family: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
        font-size: var(--code-font-size, 13px);
        line-height: 1.5;
        overflow-x: auto;
        padding-bottom: 0;
      }
      .diff-line { white-space: pre; padding: 1px 16px; }
      .diff-add { background-color: rgba(46, 160, 67, 0.25); color: #56d364; }
      .diff-del { background-color: rgba(248, 81, 73, 0.25); color: #ff7b72; }
      .diff-hunk { color: #79c0ff; background-color: rgba(56, 139, 253, 0.15); font-weight: 600; margin-top: 4px; }
      .diff-meta { color: #8b949e; font-weight: 600; }
      .diff-no-changes { display: flex; align-items: center; justify-content: center; min-height: 200px; color: var(--text-secondary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .light .diff-add { background-color: rgba(46, 160, 67, 0.3); color: #1a7f37; }
      .light .diff-del { background-color: rgba(248, 81, 73, 0.3); color: #cf222e; }
      .light .diff-hunk { color: #0969da; background-color: rgba(56, 139, 253, 0.15); }



      @media (max-width: 640px) {
        .bottom-bar { padding: 6px 12px; gap: 4px; }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="file-info">
        <svg class="file-icon" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"
          />
        </svg>
        <span class="file-path" id="filePath">Loading...</span>
        <span class="file-size" id="fileSize"></span>
      </div>
      <div class="actions">
        <div class="toggle-group" id="fontSizeToggle">
          <button class="toggle-btn" id="decreaseFontBtn" title="Decrease font size">A-</button>
          <button class="toggle-btn" id="increaseFontBtn" title="Increase font size">A+</button>
        </div>
        <div class="toggle-group" id="renderToggle" style="display: none">
          <button class="toggle-btn active" id="renderBtn" title="Render preview">
            <svg class="toggle-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M1.679 7.932c.412-.621 1.242-1.75 2.366-2.717C5.175 4.242 6.527 3.5 8 3.5c1.473 0 2.825.742 3.955 1.715 1.124.967 1.954 2.096 2.366 2.717a.119.119 0 0 1 0 .136c-.412.621-1.242 1.75-2.366 2.717C10.825 11.758 9.473 12.5 8 12.5c-1.473 0-2.825-.742-3.955-1.715C2.92 9.818 2.09 8.69 1.679 8.068a.119.119 0 0 1 0-.136ZM8 2c-1.981 0-3.67.992-4.933 2.078C1.797 5.169.88 6.423.43 7.1a1.619 1.619 0 0 0 0 1.798c.45.679 1.367 1.932 2.637 3.024C4.33 13.008 6.019 14 8 14c1.981 0 3.67-.992 4.933-2.078 1.27-1.091 2.187-2.345 2.637-3.023a1.619 1.619 0 0 0 0-1.798c-.45-.679-1.367-1.932-2.637-3.023C11.67 2.992 9.981 2 8 2Zm0 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>
            <span class="btn-label">Render</span>
          </button>
          <button class="toggle-btn" id="sourceBtn" title="View source">
            <svg class="toggle-icon" viewBox="0 0 16 16" fill="currentColor"><path d="m11.28 3.22 4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734L13.94 8l-3.72-3.72a.749.749 0 0 1 .326-1.275.749.749 0 0 1 .734.215Zm-6.56 0a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042L2.06 8l3.72 3.72a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L.47 8.53a.75.75 0 0 1 0-1.06Z"/></svg>
            <span class="btn-label">Source</span>

          <button class="toggle-btn" id="diffBtn" title="View git diff">
            <svg class="toggle-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8.75 1.75V5H12a.75.75 0 0 1 0 1.5H8.75v3.25a.75.75 0 0 1-1.5 0V6.5H4a.75.75 0 0 1 0-1.5h3.25V1.75a.75.75 0 0 1 1.5 0ZM4 13h8a.75.75 0 0 1 0 1.5H4a.75.75 0 0 1 0-1.5Z"/></svg>
            <span class="btn-label">Diff</span>
          </button>
        </div>
        <div class="toggle-group" id="sourceOnlyToggle" style="display: none">
          <button class="toggle-btn active" id="sourceOnlyBtn" title="View source">
            <svg class="toggle-icon" viewBox="0 0 16 16" fill="currentColor"><path d="m11.28 3.22 4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734L13.94 8l-3.72-3.72a.749.749 0 0 1 .326-1.275.749.749 0 0 1 .734.215Zm-6.56 0a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042L2.06 8l3.72 3.72a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L.47 8.53a.75.75 0 0 1 0-1.06Z"/></svg>
            <span class="btn-label">Source</span>
          </button>
          <button class="toggle-btn" id="diffOnlyBtn" title="View git diff">
            <svg class="toggle-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8.75 1.75V5H12a.75.75 0 0 1 0 1.5H8.75v3.25a.75.75 0 0 1-1.5 0V6.5H4a.75.75 0 0 1 0-1.5h3.25V1.75a.75.75 0 0 1 1.5 0ZM4 13h8a.75.75 0 0 1 0 1.5H4a.75.75 0 0 1 0-1.5Z"/></svg>
            <span class="btn-label">Diff</span>
          </button>
        </div>
      </div>
    </div>

    <div class="code-container">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>Loading file...</span>
      </div>
      <div class="error" id="error" style="display: none">
        <span id="errorMessage">Failed to load file</span>
      </div>
      <pre id="codeBlock" style="display: none"><code id="code"></code></pre>
      <article id="markdownContent" class="markdown-body" style="display: none"></article>
      <iframe id="renderedFrame" class="rendered-frame" style="display: none" sandbox="allow-same-origin allow-scripts"></iframe>
      <div id="diffContent" class="diff-container" style="display: none"></div>
    </div>

    <!-- Bottom bar: Download, Refresh, Open, Close -->
    <div class="bottom-bar">
      <button class="btn btn-icon" id="downloadBtn" title="Download file">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/>
          <path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.969Z"/>
        </svg>
      </button>
      <button class="btn btn-icon" id="refreshBtn" title="Refresh file">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M1.705 8.005a.75.75 0 0 1 .834.656 5.5 5.5 0 0 0 9.592 2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.646a.25.25 0 0 1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.002 7.002 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834ZM8 2.5a5.487 5.487 0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1 4.896 6H1.25A.25.25 0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.002 7.002 0 0 1 14.95 7.16a.75.75 0 1 1-1.49.178A5.5 5.5 0 0 0 8 2.5Z"/>
        </svg>
      </button>
      <button class="btn btn-icon" id="openSystemBtn" title="Open in system application" style="display: none">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M3.75 2h3.5a.75.75 0 0 1 0 1.5h-3.5a.25.25 0 0 0-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25v-3.5a.75.75 0 0 1 1.5 0v3.5A1.75 1.75 0 0 1 12.25 14h-8.5A1.75 1.75 0 0 1 2 12.25v-8.5C2 2.784 2.784 2 3.75 2Zm6.854-1h4.146a.25.25 0 0 1 .25.25v4.146a.25.25 0 0 1-.427.177L13.03 4.03 9.28 7.78a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l3.75-3.75-1.543-1.543A.25.25 0 0 1 10.604 1Z"/>
        </svg>
      </button>
      <button class="btn btn-primary" id="closeBtn" title="Close viewer">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/>
        </svg>
        <span class="btn-label">Close</span>
      </button>
    </div>

    <!-- Highlight.js -->
    <script
      nonce="{{CSP_NONCE}}"
      src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"
    ></script>
    <!-- Line numbers plugin -->
    <script
      nonce="{{CSP_NONCE}}"
      src="https://cdnjs.cloudflare.com/ajax/libs/highlightjs-line-numbers.js/2.8.0/highlightjs-line-numbers.min.js"
    ></script>

    <script nonce="{{CSP_NONCE}}">
      // Capture the CSP nonce from this script element for dynamically created scripts.
      // Must be done synchronously before any await, as document.currentScript
      // becomes null after the script finishes synchronous execution.
      // IMPORTANT: Use the .nonce property, NOT getAttribute('nonce').
      // In Chrome 61+ and Firefox, getAttribute('nonce') returns '' for security
      // (to prevent XSS from reading nonces). The .nonce property returns the real value.
      const scriptNonce = document.currentScript?.nonce || '';

      // Set up close button - use native bridge if available, fallback to window.close()
      document.getElementById("closeBtn").addEventListener("click", () => {
        if (typeof window.mittoCloseViewer === "function") {
          window.mittoCloseViewer();
        } else {
          window.close();
        }
      });

      // Set up refresh button - reload the page to get fresh file content
      document.getElementById("refreshBtn").addEventListener("click", () => {
        window.location.reload();
      });

      // Parse URL parameters - support both new format (ws=UUID) and legacy (workspace=path)
      const params = new URLSearchParams(window.location.search);
      const workspaceUUID = params.get("ws");
      const legacyWorkspace = params.get("workspace");
      const path = params.get("path");
      const wsPath = params.get("ws_path");

      // Show "Open in System App" button in native macOS app.
      // The native viewer injects mittoOpenFileURL via WKScriptMessageHandler,
      // and the main webview binds it via webview_go.
      const openSystemBtn = document.getElementById("openSystemBtn");
      if (typeof window.mittoOpenFileURL === "function" || window.mittoIsNativeViewer) {
        openSystemBtn.style.display = "";
        openSystemBtn.addEventListener("click", () => {
          if (wsPath && typeof window.mittoOpenFileURL === "function") {
            const filePath = wsPath.replace(/\/$/, "") + "/" + path.replace(/^\//, "");
            window.mittoOpenFileURL("file://" + filePath);
            // Auto-close the viewer after opening in system app
            if (typeof window.mittoCloseViewer === "function") {
              window.mittoCloseViewer();
            } else {
              window.close();
            }
          }
        });
      }

      // Detect theme preference
      if (
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: light)").matches
      ) {
        document.body.classList.add("light");
        // Load light theme CSS
        const lightTheme = document.createElement("link");
        lightTheme.rel = "stylesheet";
        lightTheme.href =
          "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css";
        document.head.appendChild(lightTheme);
      }

      // Get API prefix from the URL path
      function getAPIPrefix() {
        const urlPath = window.location.pathname;
        const viewerIndex = urlPath.indexOf("/viewer.html");
        if (viewerIndex > 0) {
          return urlPath.slice(0, viewerIndex);
        }
        return "";
      }

      // Format file size
      function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      // Get language from file extension
      function getLanguage(filename) {
        const ext = filename.split(".").pop().toLowerCase();
        const langMap = {
          js: "javascript",
          mjs: "javascript",
          cjs: "javascript",
          ts: "typescript",
          tsx: "typescript",
          jsx: "javascript",
          py: "python",
          rb: "ruby",
          go: "go",
          rs: "rust",
          java: "java",
          kt: "kotlin",
          swift: "swift",
          c: "c",
          h: "c",
          cpp: "cpp",
          hpp: "cpp",
          cc: "cpp",
          cs: "csharp",
          php: "php",
          sh: "bash",
          bash: "bash",
          zsh: "bash",
          fish: "bash",
          ps1: "powershell",
          sql: "sql",
          html: "html",
          htm: "html",
          xml: "xml",
          css: "css",
          scss: "scss",
          sass: "scss",
          less: "less",
          json: "json",
          yaml: "yaml",
          yml: "yaml",
          toml: "toml",
          ini: "ini",
          conf: "ini",
          md: "markdown",
          markdown: "markdown",
          dockerfile: "dockerfile",
          makefile: "makefile",
          cmake: "cmake",
          gradle: "gradle",
          groovy: "groovy",
          lua: "lua",
          perl: "perl",
          r: "r",
          scala: "scala",
          clj: "clojure",
          ex: "elixir",
          exs: "elixir",
          erl: "erlang",
          hs: "haskell",
          ml: "ocaml",
          vim: "vim",
          diff: "diff",
          patch: "diff",
        };
        return langMap[ext] || null;
      }

      // Load and display file
      async function loadFile() {
        if ((!workspaceUUID && !legacyWorkspace) || !path) {
          showError("Missing ws/workspace or path parameter");
          return;
        }

        // Update UI with file path
        document.getElementById("filePath").textContent = path;
        document.title = `${path.split("/").pop()} - Mitto`;

        try {
          const apiPrefix = getAPIPrefix();
          // Use UUID if available, otherwise fall back to legacy workspace path
          const wsParam = workspaceUUID
            ? `ws=${encodeURIComponent(workspaceUUID)}`
            : `workspace=${encodeURIComponent(legacyWorkspace)}`;
          const fileUrl = `${apiPrefix}/api/files?${wsParam}&path=${encodeURIComponent(path)}`;

          // Detect file type from extension
          const ext = path.split(".").pop().toLowerCase();

          // Handle image files — render directly without fetching as text
          const imageExtensions = ["png", "jpg", "jpeg", "gif", "webp", "svg", "bmp", "ico"];
          if (imageExtensions.includes(ext)) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("fontSizeToggle").style.display = "none";

            const container = document.querySelector(".code-container");
            const imgContainer = document.createElement("div");
            imgContainer.style.cssText = "display: flex; justify-content: center; align-items: flex-start; padding: 20px; overflow: auto; min-height: 200px;";

            const img = document.createElement("img");
            img.src = fileUrl;
            img.alt = path;
            img.style.cssText = "max-width: 100%; height: auto; object-fit: contain;";
            img.onerror = () => showError("Failed to load image: " + path);

            imgContainer.appendChild(img);
            container.appendChild(imgContainer);

            // Set up download for image
            document.getElementById("downloadBtn").addEventListener("click", () => {
              const a = document.createElement("a");
              a.href = fileUrl;
              a.download = path.split("/").pop();
              a.click();
            });

            return;
          }

          const response = await fetch(fileUrl);
          if (!response.ok) {
            throw new Error(
              response.status === 404
                ? "File not found"
                : response.status === 403
                  ? "Access denied"
                  : `HTTP ${response.status}`,
            );
          }

          const isMarkdown = (ext === "md" || ext === "markdown");
          const isHTML = (ext === "html" || ext === "htm");
          const canRender = isMarkdown || isHTML;

          // Fetch raw content for all text files
          const rawContent = await response.text();
          const size = new Blob([rawContent]).size;
          document.getElementById("fileSize").textContent = formatSize(size);

          // Set up download button with raw content
          document.getElementById("downloadBtn").onclick = () => {
            const blob = new Blob([rawContent], { type: "text/plain" });
            const dlUrl = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = dlUrl;
            a.download = path.split("/").pop();
            a.click();
            URL.revokeObjectURL(dlUrl);
          };

          // --- Render/Source/Diff toggle logic ---
          let currentMode = canRender ? "render" : "source";
          let diffLoaded = false;
          let diffContent = null;

          function hideAll() {
            document.getElementById("codeBlock").style.display = "none";
            document.getElementById("markdownContent").style.display = "none";
            document.getElementById("renderedFrame").style.display = "none";
            document.getElementById("diffContent").style.display = "none";
          }

          function clearAllActive() {
            // Clear active state on all toggle buttons in both toggle groups
            document.querySelectorAll(".toggle-btn").forEach(btn => btn.classList.remove("active"));
          }

          function showRendered() {
            hideAll();
            document.getElementById("fontSizeToggle").style.display = "none";

            if (isMarkdown) {
              document.getElementById("markdownContent").style.display = "block";
            } else if (isHTML) {
              const iframe = document.getElementById("renderedFrame");
              iframe.srcdoc = rawContent;
              iframe.style.display = "block";
            }

            clearAllActive();
            document.getElementById("renderBtn").classList.add("active");
            currentMode = "render";
          }

          function showSource() {
            hideAll();
            document.getElementById("codeBlock").style.display = "block";
            document.getElementById("fontSizeToggle").style.display = "";

            clearAllActive();
            if (canRender) {
              document.getElementById("sourceBtn").classList.add("active");
            } else {
              document.getElementById("sourceOnlyBtn").classList.add("active");
            }
            currentMode = "source";

            // Highlight source if not already done
            const codeElement = document.getElementById("code");
            if (!codeElement._highlighted) {
              codeElement.textContent = rawContent;
              const lang = getLanguage(path);
              if (lang) codeElement.className = `language-${lang}`;
              hljs.highlightElement(codeElement);
              hljs.lineNumbersBlock(codeElement);
              codeElement._highlighted = true;
            }
          }

          async function showDiff() {
            hideAll();
            document.getElementById("fontSizeToggle").style.display = "";
            const diffEl = document.getElementById("diffContent");
            diffEl.style.display = "block";

            clearAllActive();
            if (canRender) {
              document.getElementById("diffBtn").classList.add("active");
            } else {
              document.getElementById("diffOnlyBtn").classList.add("active");
            }
            currentMode = "diff";

            // Fetch diff if not already loaded
            if (!diffLoaded) {
              diffEl.innerHTML = '<div class="diff-no-changes">Loading diff...</div>';
              try {
                const diffUrl = `${apiPrefix}/api/files?${wsParam}&path=${encodeURIComponent(path)}&diff=true`;
                const resp = await fetch(diffUrl);
                diffContent = await resp.text();
                diffLoaded = true;
              } catch (err) {
                diffContent = "Error loading diff: " + err.message;
              }
            }

            // Render diff with syntax coloring
            if (diffContent === "No changes" || diffContent === "Not a git repository") {
              diffEl.innerHTML = `<div class="diff-no-changes">${diffContent === "No changes" ? "No uncommitted changes" : diffContent}</div>`;
            } else {
              const lines = diffContent.split("\n");
              diffEl.innerHTML = lines.map(line => {
                const escaped = line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                if (line.startsWith("+++ ") || line.startsWith("--- ")) {
                  return `<div class="diff-line diff-meta">${escaped}</div>`;
                } else if (line.startsWith("@@")) {
                  return `<div class="diff-line diff-hunk">${escaped}</div>`;
                } else if (line.startsWith("+")) {
                  return `<div class="diff-line diff-add">${escaped}</div>`;
                } else if (line.startsWith("-")) {
                  return `<div class="diff-line diff-del">${escaped}</div>`;
                } else if (line.startsWith("diff ") || line.startsWith("index ")) {
                  return `<div class="diff-line diff-meta">${escaped}</div>`;
                } else {
                  return `<div class="diff-line">${escaped}</div>`;
                }
              }).join("");
            }
          }

          // Show appropriate toggle for file type
          if (canRender) {
            // Renderable files: Render | Source | Diff
            document.getElementById("renderToggle").style.display = "";
            document.getElementById("renderBtn").addEventListener("click", showRendered);
            document.getElementById("sourceBtn").addEventListener("click", showSource);
            document.getElementById("diffBtn").addEventListener("click", showDiff);
          } else {
            // Non-renderable files: Source | Diff
            document.getElementById("sourceOnlyToggle").style.display = "";
            document.getElementById("sourceOnlyBtn").addEventListener("click", showSource);
            document.getElementById("diffOnlyBtn").addEventListener("click", showDiff);
          }

          document.getElementById("loading").style.display = "none";

          if (isMarkdown) {
            // Fetch server-rendered HTML for markdown
            const renderUrl = `${apiPrefix}/api/files?${wsParam}&path=${encodeURIComponent(path)}&render=html`;
            const renderResponse = await fetch(renderUrl);
            if (!renderResponse.ok) throw new Error(`HTTP ${renderResponse.status}`);
            let htmlContent = await renderResponse.text();

            // Handle both full HTML doc and fragment responses
            if (htmlContent.trimStart().startsWith("<!DOCTYPE") || htmlContent.trimStart().toLowerCase().startsWith("<html")) {
              const parser = new DOMParser();
              const doc = parser.parseFromString(htmlContent, "text/html");
              const article = doc.querySelector("article");
              htmlContent = article ? article.innerHTML : doc.body.innerHTML;
            }

            const markdownEl = document.getElementById("markdownContent");
            markdownEl.innerHTML = htmlContent;
            showRendered();

            // Handle mermaid diagrams
            const mermaidBlocks = document.querySelectorAll('#markdownContent pre.mermaid');
            if (mermaidBlocks.length > 0) {
              const script = document.createElement('script');
              script.src = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js';
              if (scriptNonce) script.setAttribute('nonce', scriptNonce);
              script.onerror = (err) => {
                console.error('Failed to load mermaid.js from CDN:', err);
                mermaidBlocks.forEach((block) => {
                  const notice = document.createElement('div');
                  notice.style.cssText = 'color: var(--text-secondary, #888); font-size: 0.85em; padding: 4px 8px; border-bottom: 1px solid var(--border-color, #333);';
                  notice.textContent = '⚠️ Mermaid diagram could not be rendered (failed to load library)';
                  block.parentNode.insertBefore(notice, block);
                });
              };
              script.onload = async function() {
                const isDark = document.body.classList.contains('light') ? false : true;
                mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default', securityLevel: 'strict' });
                for (const [index, block] of Array.from(mermaidBlocks).entries()) {
                  try {
                    const { svg } = await mermaid.render('mermaid-' + index, block.textContent || '');
                    const wrapper = document.createElement('div');
                    wrapper.className = 'mermaid-diagram';
                    wrapper.innerHTML = svg;
                    block.replaceWith(wrapper);
                  } catch (err) {
                    console.error('Failed to render mermaid diagram:', err);
                    const notice = document.createElement('div');
                    notice.style.cssText = 'color: var(--text-secondary, #888); font-size: 0.85em; padding: 4px 8px;';
                    notice.textContent = '⚠️ Mermaid diagram could not be rendered: ' + (err.message || err);
                    block.parentNode.insertBefore(notice, block);
                  }
                }
              };
              document.head.appendChild(script);
            }
          } else if (isHTML) {
            // Render HTML in iframe by default
            showRendered();
          } else {
            // Plain source code
            showSource();
          }

          // Font size management (shared across all modes)
          const MIN_FONT_SIZE = 8;
          const MAX_FONT_SIZE = 24;
          const DEFAULT_FONT_SIZE = 13;
          let currentFontSize = DEFAULT_FONT_SIZE;

          try {
            const saved = localStorage.getItem("mitto-viewer-font-size");
            if (saved) {
              currentFontSize = parseInt(saved, 10);
              if (isNaN(currentFontSize) || currentFontSize < MIN_FONT_SIZE || currentFontSize > MAX_FONT_SIZE) {
                currentFontSize = DEFAULT_FONT_SIZE;
              }
            }
          } catch (err) { /* ignore */ }

          document.documentElement.style.setProperty("--code-font-size", `${currentFontSize}px`);

          document.getElementById("decreaseFontBtn").onclick = () => {
            if (currentFontSize > MIN_FONT_SIZE) {
              currentFontSize--;
              document.documentElement.style.setProperty("--code-font-size", `${currentFontSize}px`);
              try { localStorage.setItem("mitto-viewer-font-size", currentFontSize.toString()); } catch (e) {}
            }
          };

          document.getElementById("increaseFontBtn").onclick = () => {
            if (currentFontSize < MAX_FONT_SIZE) {
              currentFontSize++;
              document.documentElement.style.setProperty("--code-font-size", `${currentFontSize}px`);
              try { localStorage.setItem("mitto-viewer-font-size", currentFontSize.toString()); } catch (e) {}
            }
          };

          // --- Link interception for rendered content ---
          // Relative links → resolve against current file's directory, open in viewer if file exists.
          // External links (http/https/mailto) → open in system browser.

          function openLinkExternally(url) {
            if (typeof window.mittoOpenFileURL === "function") {
              window.mittoOpenFileURL(url);
            } else {
              window.open(url, "_blank", "noopener,noreferrer");
            }
          }

          // Resolve a relative href against the current file's directory in the workspace.
          function resolveWorkspacePath(href) {
            const hashIdx = href.indexOf("#");
            const linkPath = hashIdx >= 0 ? href.substring(0, hashIdx) : href;
            const fragment = hashIdx >= 0 ? href.substring(hashIdx) : "";
            if (!linkPath) return null; // pure fragment

            const currentDir = path.includes("/")
              ? path.substring(0, path.lastIndexOf("/"))
              : "";

            let resolved;
            if (linkPath.startsWith("/")) {
              resolved = linkPath.substring(1);
            } else {
              resolved = currentDir ? currentDir + "/" + linkPath : linkPath;
            }

            // Normalize ../ and ./
            const parts = resolved.split("/");
            const normalized = [];
            for (const part of parts) {
              if (part === "." || part === "") continue;
              if (part === ".." && normalized.length > 0) { normalized.pop(); continue; }
              if (part === "..") continue;
              normalized.push(part);
            }
            return { path: normalized.join("/"), fragment };
          }

          // Check if a file exists in the workspace via HEAD request.
          async function fileExistsInWorkspace(filePath) {
            const wsParam = workspaceUUID
              ? `ws=${encodeURIComponent(workspaceUUID)}`
              : `workspace=${encodeURIComponent(wsPath || "")}`;
            const url = `${apiPrefix}/api/files?${wsParam}&path=${encodeURIComponent(filePath)}`;
            try {
              const resp = await fetch(url, { method: "HEAD" });
              return resp.ok;
            } catch { return false; }
          }

          // Build a viewer URL for a workspace file path.
          function buildViewerUrl(filePath, fragment) {
            const wsParam = workspaceUUID ? encodeURIComponent(workspaceUUID) : "";
            let url = `${window.location.pathname}?ws=${wsParam}&path=${encodeURIComponent(filePath)}`;
            if (wsPath) {
              url += `&ws_path=${encodeURIComponent(wsPath)}`;
            }
            if (fragment) url += fragment;
            return url;
          }

          // Handle a link click in rendered content.
          async function handleContentLink(href) {
            // External URLs → open in system browser
            if (/^(https?:\/\/|file:\/\/|mailto:)/i.test(href)) {
              openLinkExternally(href);
              return;
            }

            // Relative link → resolve against current file's workspace directory
            const resolved = resolveWorkspacePath(href);
            if (!resolved) return;

            const exists = await fileExistsInWorkspace(resolved.path);
            if (exists) {
              // File exists in workspace → navigate the viewer to it
              window.location.href = buildViewerUrl(resolved.path, resolved.fragment);
            } else {
              // Not a workspace file → try as external URL
              openLinkExternally(href);
            }
          }

          if (canRender) {
            // Intercept clicks on links in rendered markdown
            document.getElementById("markdownContent").addEventListener("click", function(e) {
              const link = e.target.closest("a");
              if (!link) return;
              const href = link.getAttribute("href");
              if (!href || href.startsWith("#")) return;
              e.preventDefault();
              e.stopPropagation();
              handleContentLink(href);
            });

            // Intercept clicks on links in rendered HTML iframe
            const renderedFrame = document.getElementById("renderedFrame");
            renderedFrame.addEventListener("load", function() {
              try {
                const doc = renderedFrame.contentDocument;
                if (!doc) return;
                doc.addEventListener("click", function(e) {
                  const link = e.target.closest("a");
                  if (!link) return;
                  const href = link.getAttribute("href");
                  if (!href || href.startsWith("#")) return;
                  e.preventDefault();
                  e.stopPropagation();
                  handleContentLink(href);
                });
              } catch (err) {
                console.warn("Cannot attach link handler to iframe:", err);
              }
            });
          }

        } catch (err) {
          showError(err.message);
        }
      }

      function showError(message) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error").style.display = "flex";
        document.getElementById("errorMessage").textContent = message;
      }

      // Load file on page load
      loadFile();

      // Register service worker for PWA installability
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js").catch((err) => {
          console.warn("Service worker registration failed:", err);
        });
      }
    </script>
  </body>
</html>
