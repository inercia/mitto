icon: play
name: Continue
description: Continue with the current task from where we left off
group: Work flow
menus: prompts, conversation
backgroundColor: '#FFF9C4'
enabledWhen: '!Session.IsPeriodicConversation'
prompt: |
  Before taking any action, review the current state of the work by reading relevant files,
  checking git status, and understanding what has already been completed.

  Continue with the current task from where we left off.

  Rules:

  1. Review the current state and what has been completed
  2. Identify the next immediate step
  3. Execute that step
  4. Report progress and what remains

  If blocked or unclear, ask for clarification before proceeding.

  ## If this work is tied to a beads issue

  The linked beads issue for this conversation is `{{ .Session.BeadsIssue }}` (empty if none). **Only apply
  this section when that value is non-empty** — i.e. we were working on a specific bead. Skip it
  entirely otherwise.

  Beads is a CLI issue tracker (`bd`); issues ("beads") have IDs like `bd-xyz`.

  1. **Check whether the bead is complete.** Load it and compare its acceptance criteria against the
     actual state of the work and the codebase:

     ```bash
     bd show {{ .Session.BeadsIssue }} --long --json   # description, acceptance criteria, status
     bd dep tree {{ .Session.BeadsIssue }}             # parent epic and sibling beads
     ```

  2. **If the bead is NOT complete** — work remains against its acceptance criteria — just keep going:
     continue implementing the remaining work as the natural next step above, rather than wrapping up.

  3. **If the bead IS complete** — all acceptance criteria are met — do **not** close or commit on your
     own. Instead, present the finding and suggest the wrap-up actions, then act only on what the user
     approves. Use `mitto_ui_options_mitto(self_id: "{{ .Session.ID }}", allow_free_text: true)` (fall
     back to a plain question if the `mitto_*` tools are unavailable) to offer:
     - **"Close the issue"** — `bd close {{ .Session.BeadsIssue }} --reason "<what was delivered>"`.
     - **"Commit the changes"** — commit the work for this bead with a clear message referencing it.

     You may offer both so the user can pick either, both, or neither. Honour their choice exactly.

  4. **If the bead is part of an epic** (it has a parent epic in `bd dep tree`) and it is now complete,
     also suggest moving on to the **next ready issue in that epic**. Find the parent epic ID, then
     look for a sibling that is unblocked and ready to work on:

     ```bash
     bd ready --json    # ready, unblocked beads; pick one whose parent is this epic
     ```

     If there is a ready sibling, suggest taking it next (offer it as an option alongside the close /
     commit actions above). If the epic has no ready issues left, say so.
