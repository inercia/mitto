icon: beads
name: Discuss & Refine
menus: beadsIssues
requires: parameters
description: 'Discuss and refine a bead: resolve pending decisions, assess its quality, and sharpen it until it is ready to work on — capturing the rationale back into the tracker'
backgroundColor: '#F8BBD0'
group: Tasks
enabledWhen: commandExists("bd") && dirExists(".beads")
prompt: |
  ## Session Context

  Your session ID is `@mitto:session_id` — use this as `self_id` for all `mitto_*` MCP tool calls.

  # Beads: Discuss & Refine a Bead

  Beads is a CLI issue tracker (`bd`). Issues are called "beads" and have IDs like `bd-xyz`.

  The **target bead** is `${ISSUE_ID}`. Your job is to help the user **think through and refine** this
  bead — resolving pending decisions, assessing its quality, and clarifying gaps — until it is
  **ready to work on**, then **capture the outcome back into the tracker**.

  > **Scope:** this is a *discussion and refinement* prompt. Do **not** implement the work, write
  > code, or change anything outside the beads tracker. You may only investigate, discuss, and — with
  > the user's confirmation — update this bead or create new beads.

  ## Step 1 — Load the bead and its context

  ```bash
  bd show ${ISSUE_ID} --long --json     # description, acceptance, design, notes, labels, status
  bd dep tree ${ISSUE_ID}               # blockers and what it blocks
  bd show ${ISSUE_ID} --children --json # existing child beads (if any)
  bd comments ${ISSUE_ID}               # prior discussion, if any
  ```

  Read everything carefully. Where the bead references code or features, investigate the **codebase**
  just enough to discuss it knowledgeably — but remember you are not here to implement it.

  ## Step 2 — Analyse the bead: pending decisions & blockers

  Scan the bead for **decisions that are blocking progress or awaiting input**, and for anything
  stopping it from being worked on, e.g.:

  - Open questions in the description, notes, or comments ("should we…?", "TBD", "decide whether…")
  - Unresolved trade-offs between approaches, or an undefined acceptance criterion
  - A `blocked` / `deferred` status, or labels such as `needs-decision` / `question` / `discuss`
  - Unmet dependencies or prerequisites (from `bd dep tree`)
  - Ambiguity that would force an implementer to guess

  **If nothing stands out** — no pending decisions, blockers, or obvious gaps — ask the user what they
  want to refine or discuss, via `mitto_ui_options_mitto(self_id: "@mitto:session_id",
  allow_free_text: true)`, offering focus areas such as *scope*, *approach / design*, *acceptance
  criteria*, *risks & edge cases*, or *priority*, plus free text for their own topic.

  ## Step 3 — Propose next steps and pick a direction

  Based on your analysis, propose a **short list of concrete next steps**, each with clear reasoning
  for why it matters and what it would settle. Then ask the user **which direction to take** via
  `mitto_ui_options_mitto(self_id: "@mitto:session_id", allow_free_text: true)`, listing the proposed
  steps as options plus free text so they can choose, reprioritise, or describe their own.

  ## Step 4 — Assess the bead's quality

  Evaluate whether the bead is **ready to work on**, checking:

  - **Description** — is it complete and unambiguous?
  - **Acceptance criteria** — are they defined, and do they make "done" clear?
  - **Dependencies / prerequisites** — are they identified and understood?
  - **Actionability** — could an implementer pick this up as-is, or does it need refinement first?

  Summarise the result as a short readiness checklist, flagging each item as ✅ clear or ⚠️ needs work.

  ## Step 5 — Identify what still needs clarification

  From the quality assessment, list the **specific gaps or ambiguities** that must be resolved before
  the bead is ready — the open questions, undefined criteria, or unclear dependencies that would
  otherwise force an implementer to guess. If the bead is already in good shape, say so.

  ## Step 6 — Discuss the gaps with the user

  Engage the user in **focused discussion** on the gaps from Step 5 (and the direction chosen in
  Step 3). Ground the conversation in evidence — investigate the codebase, related beads, and history
  as needed so your input is concrete rather than speculative. Batch related questions into a single
  `mitto_ui_options_mitto(self_id: "@mitto:session_id", allow_free_text: true)` call, offering your
  best-guess answer plus free text, and iterate until each gap is resolved into an **actionable
  conclusion**.

  ## Step 7 — Update the bead (after confirming)

  Everything above is **read-only until the user confirms**. Present exactly what you intend to change
  and get approval via `mitto_ui_options_mitto(self_id: "@mitto:session_id", allow_free_text: true)`,
  e.g. "Apply these updates to `${ISSUE_ID}`?" with options like **"Apply all"**, **"Apply some"**
  (free text), and **"Make no changes"**. Never write anything the user did not approve.

  Once approved, update the bead to reflect the decisions made:

  ```bash
  bd update ${ISSUE_ID} --body-file /tmp/bead-desc.md       # revise the description
  bd update ${ISSUE_ID} --acceptance "<now-clear criteria>" # if a decision sharpened "done"
  bd update ${ISSUE_ID} --append-notes "<decisions + rationale>"
  bd update ${ISSUE_ID} --remove-label needs-decision       # drop flags the decision removed
  bd update ${ISSUE_ID} -s open                             # un-block now that it can proceed
  bd update ${ISSUE_ID} -p <0-4>                            # if the decision changed its priority
  ```

  **Whenever you change the description** (or other substantive fields), **add a comment documenting
  the change and the reasoning behind it** — this preserves the decision history and makes it easy to
  understand why the bead evolved as it did:

  ```bash
  bd comment ${ISSUE_ID} "Refined <what changed> — rationale: <why>"
  ```

  If the discussion revealed separable work, you may propose sub-issues (title, one-line scope,
  type/priority); for a full breakdown defer to the **"Decompose issue"** prompt. After confirmation:

  ```bash
  bd create "<child title>" --parent ${ISSUE_ID} --type <type> --priority <0-4> --body-file /tmp/child.md
  ```

  ## Step 8 — Final summary

  Summarise the work: the decisions resolved (with rationale), the readiness assessment, which bead
  fields / labels / status changed, the comments added, and any sub-issues created (IDs + titles).
  Reiterate that **no implementation was done** — point the user to the **"Start work"** prompt when
  the bead is ready.

  ## Final step — Offer to delete this conversation

  The task is complete. Offer to tidy up so finished conversations do not accumulate.

  1. Ask the user whether to delete this conversation now, via
     `mitto_ui_options_mitto(self_id: "@mitto:session_id", question: "All done — delete this conversation now?", timeout_seconds: 120)` with options:
     - **"Yes, delete it"**
     - **"No, keep it"**

  2. Honour the answer:
     - **Delete** → first notify the user (the deletion is deferred until your turn ends, so the
       message is delivered first) with
       `mitto_ui_notify_mitto(self_id: "@mitto:session_id", title: "<short outcome>", message: "<one-line summary of what was done>", style: "success")`,
       then self-destruct with
       `mitto_conversation_delete_mitto(self_id: "@mitto:session_id", conversation_id: "self")`.
     - **Keep** → leave the conversation in place.

  3. **On timeout** (no response): only delete this conversation if **all** of the following hold —
     it was **started by this prompt** (a dedicated conversation for this task, not an existing
     conversation you were invoked into), **no further action is expected from the user**, and
     **all the work was clearly completed**. If so, notify (as above) then self-destruct; otherwise
     leave the conversation untouched.

  If the `mitto_*` tools are unavailable, skip this step silently.
