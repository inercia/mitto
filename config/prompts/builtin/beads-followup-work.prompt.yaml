icon: search
name: Identify follow-up issues
menus: beadsIssues, prompts, conversation
parameters:
  - name: IssueID
    type: beadsId
    required: false
    description: The beads issue ID to act on
description: Review for incomplete work, follow-up items, and edge cases — for a specific bead or the whole conversation — organize them (grouping related items under epics), and file them as beads
backgroundColor: '#DCEDC8'
group: Tasks
enabledWhen: CommandExists("bd") && DirExists(".beads") && (Session.HasMessages || Session.HasBeadsIssue || Item.Id != "")
prompt: |
  ## Session Context

  Your session ID is `{{ .Session.ID }}` — use this as `self_id` for all `mitto_*` MCP tool calls.

  # Beads: Identify Follow-up Work

  Beads is a CLI issue tracker (`bd`). Issues are called "beads" and have IDs like `bd-xyz`. Beads supports first-class parent/child hierarchy (epics) and blocking dependencies.

  {{ $target := "" -}}
  {{ if .Session.BeadsIssue }}{{ $target = .Session.BeadsIssue }}{{ else if .Args.IssueID }}{{ $target = .Args.IssueID }}{{ end -}}
  {{ if $target -}}
  The **target bead** is `{{ $target }}`. Your job is to identify **follow-up work for this specific bead**: parts of it left unfinished, acceptance criteria not yet met, edge cases and hardening it does not yet cover, and problems discovered while working on it. Organize what you find into a clean structure and file a bead for each so nothing is lost — by default as **children of `{{ $target }}`**.
  {{- else -}}
  While working on a focused task, it's common to discover **other** problems, to leave parts of a request unfinished, or to spot edge cases worth handling later. Your job here is to comb back through **this conversation**, extract everything that warrants future work, organize it into a clean structure, and file a bead for each so nothing is lost.
  {{- end }}

  {{ if $target -}}
  ## Step 1 — Understand the target bead, then mine for follow-up work

  First load the bead and its context so you know what it covers and what has (and has not) been done:

  ```bash
  bd show {{ $target }} --long --json      # description, acceptance criteria, design, notes
  bd dep tree {{ $target }}                # blockers and what it blocks
  bd show {{ $target }} --children --json  # existing children (avoid duplicating them)
  bd comments {{ $target }}                # prior discussion / decisions
  ```

  Then review the current state (relevant files, `git status`, recent changes, and this conversation if it worked on the bead) and extract every follow-up item that deserves its own bead. Use the context you already have — do not ask the user to re-explain. Look for:

  - **Unmet acceptance criteria**: conditions from the bead that are not yet satisfied.
  - **Unfinished sub-parts**: portions of the bead's scope left incomplete.
  - **Side discoveries**: problems noticed while working on the bead (a related bug, a fragile code path, a missing edge-case handler).
  - **Edge cases & hardening**: inputs, states, or failure modes the work does not yet handle and should.
  - **Deferred / parked work**: anything explicitly postponed, TODOs, tech debt, missing tests, or missing docs tied to this bead.
  {{- else -}}
  ## Step 1 — Mine the conversation for follow-up work

  Review the full conversation history and extract every item that deserves its own bead. Use the context you already have — do not ask the user to re-explain what happened. Look for:

  - **Unsolved problems**: bugs, errors, failing tests, or warnings that were observed but left unfixed because we focused on something else.
  - **Incomplete requests**: things the user asked for that were **not** done. For example, if the user wanted A, B, and C and only A was delivered, B and C each become a bead.
  - **Side discoveries**: problems noticed in passing while doing the main work (e.g. a related bug, a fragile code path, a missing edge-case handler).
  - **Edge cases & hardening**: inputs, states, or failure modes that the current work does not yet handle and should.
  - **Deferred / parked work**: anything explicitly postponed ("let's do this later", "out of scope for now"), TODOs, tech debt, missing tests, or missing docs.
  {{- end }}

  For each candidate, capture: a short **title**, a **description** (what it is, why it matters, where it lives — files/components — and any context such as root cause, repro, or proposed fix), and a suggested **type** and **priority**.

  If you find **nothing** worth tracking, say so clearly and stop — do not invent work.

  ## Step 2 — Learn the project's conventions

  So your beads match the project's style:

  ```bash
  bd list --limit 20 --json   # recent beads: common labels, types, priorities
  bd types                    # valid issue types in this project
  ```

  ## Step 3 — Avoid duplicates and discover existing epics

  Check whether any candidate is already tracked, and learn which epics already exist so you can slot work into them:

  ```bash
  bd list --json                            # all beads (scan titles/descriptions for overlap)
  bd list --type epic --status open --json  # open epics: candidate parents for new work
  ```

  Drop or merge any candidate that clearly duplicates an existing open bead. Note which existing bead it matched so you can report it.

  Keep the list of open epics handy — in the next step you'll prefer attaching new items to a fitting existing epic over inventing a new one. For each epic, note its **ID**, **title**, and what it covers (read its description with `bd show <epic-id>` if the title is ambiguous).

  ## Step 4 — Organize into a logical structure

  Group the surviving candidates so related work lives together instead of as a flat pile. Prefer reusing existing structure over creating new structure:

  {{ if $target -}}
  - **Default to children of the target bead `{{ $target }}`.** Because every item here is follow-up work for this bead, make each one a **child of `{{ $target }}`** unless it clearly is **not** a sub-part of it — in that case keep it standalone (or `related`-link it to `{{ $target }}`) rather than forcing the parent. Prefer the target bead over inventing a new epic.
  {{ end -}}
  - **Attach to an existing epic first.** For each item, check whether one of the open epics from Step 3 already covers its theme, feature, or component. If a fitting epic exists, make the item a **child of that existing epic** (record the real epic ID) rather than creating a new parent. A single item is reason enough to attach to an existing epic — you don't need a cluster to reuse one.
  - **Create a new epic only when needed.** When two or more related items share a theme that **no existing epic** covers, propose a **new epic** (parent bead) to hold them, and make those items its **children**. A new epic needs a clear title and a one-line purpose.
  - **Keep genuinely standalone items at the top level** — do not invent a new epic for a single item, and do not force an item into an existing epic that doesn't truly fit.
  - Within each epic (existing or new), note any **ordering dependencies** between children (child B can't start until child A is done) — you'll wire these as blocking edges later.
  - For each item (and each new epic), assign sensible defaults: `bug` for defects, `task`/`feature`/`chore` otherwise; `epic` for new parents; priority by real impact (P0 highest .. P4 lowest), defaulting to P2/P3 for follow-ups.

  Number every epic and item so each maps to a checkbox in the next step.

  ## Step 5 — Present the structured list and let the user accept or ignore each item

  This is **read-only until you confirm**. First, **print the organized list as a regular message** so the user can see the structure — existing epics with their newly-attached children, then proposed new epics with their children, then standalone items — each line formatted as:

  > **[<type> · <priority>] <title>** — <one-line why>

  Then present **every** epic and item in a single `mitto_ui_form_mitto(self_id: "{{ .Session.ID }}")` as checkboxes, **checked by default**, so the user can simply uncheck what to skip. Nest children under their epic visually:

  ```html
  <p>Select what to file as beads. Unchecked items are skipped. Epics group their children.</p>

  <p><strong>[existing epic · bd-42] Parser hardening</strong> — new items will be filed under this epic:</p>
  <label>&nbsp;&nbsp;&nbsp;&nbsp;<input type="checkbox" name="bead_1" checked /> [bug · P2] Crash on empty input — found while fixing X</label>
  <label>&nbsp;&nbsp;&nbsp;&nbsp;<input type="checkbox" name="bead_2" checked /> [chore · P3] Add missing parser tests</label>

  <label><input type="checkbox" name="epic_1" checked /> [new epic · P2] Export pipeline</label>
  <label>&nbsp;&nbsp;&nbsp;&nbsp;<input type="checkbox" name="bead_3" checked /> [feature · P2] CSV export — requested but not done</label>
  <label>&nbsp;&nbsp;&nbsp;&nbsp;<input type="checkbox" name="bead_4" checked /> [task · P3] JSON export tests</label>

  <label><input type="checkbox" name="bead_5" checked /> [task · P3] Part B of the original request — not yet done</label>
  ```

  Use stable names: `epic_<N>` for **proposed new** epics and `bead_<N>` for items (matching the numbering from Step 4). **Existing** epics are shown as plain headers (no checkbox) — they already exist, so there's nothing to approve; only their newly-attached children get checkboxes. In your plan, remember which `bead_<N>` items belong to which existing epic ID. Submit/Cancel buttons are added automatically.

  Interpreting the result:
  - An epic or item is **approved** only if its key is **present** in the returned values — checked boxes are submitted, unchecked boxes are omitted entirely.
  - If a **new epic is unchecked but some of its children are checked**, create those children as **standalone top-level beads** so the work is not lost.
  - If a child of an **existing epic** is checked, create it as a child of that existing epic. Existing epics are never created or modified beyond gaining children.
  - If the user **cancels** the form, or submits with **everything unchecked**, create nothing and report that no beads were filed.

  ## Step 6 — Create the approved beads

  Create approved **new epics first** so their children can reference them; children of **existing** epics use the real epic IDs from Step 3{{ if $target }}; children of the target bead use `{{ $target }}` as their parent{{ end }}. For each bead, compose a well-structured Markdown description (Summary, Findings / Context, Proposed Solution if known, Acceptance Criteria), write it to a temporary file, and pass it via `--body-file` to preserve formatting and avoid shell-quoting issues:

  ```bash
  {{ if $target -}}
  # Child of the target bead (the default for follow-up items)
  bd create "<title>" --parent {{ $target }} --type <type> --priority <priority> --body-file /tmp/bead-item.md
  {{ end -}}
  # New epic (parent)
  bd create "<epic title>" --type epic --priority <priority> --labels "<labels>" --body-file /tmp/bead-epic.md
  # Child of a new epic (use the ID just returned) or of an existing epic (use its Step 3 ID)
  bd create "<title>" --parent <epic-id> --type <type> --priority <priority> --body-file /tmp/bead-item.md
  # Standalone item (no epic)
  bd create "<title>" --type <type> --priority <priority> --labels "<labels>" --body-file /tmp/bead-item.md
  ```

  Capture each new bead ID from the output. Report any creation that fails and why.

  ## Step 7 — Wire relationships

  For each ordering dependency identified in Step 4 (child B can't start until child A is done), add a blocking edge; link non-blocking relationships as `related`:

  ```bash
  bd dep add <blocked-id> <blocker-id>          # blocker blocks blocked
  bd link <id> <other-id> --type related        # non-blocking relationship
  bd dep cycles                                 # verify integrity
  ```

  For each epic that gained children — **newly created or pre-existing** — record the grouping in its history with a terse audit note:

  ```bash
  bd update <epic-id> --append-notes "Grouped <N> follow-ups (<child-ids>) from conversation review: <one-line rationale>."
  ```

  ## Step 8 — Final summary

  Finish with a short summary listing:

  - Each **epic** (ID + title) with its children indented beneath it — both newly created epics and existing epics that received new children — then standalone beads, grouped for readability.
  - The dependency edges created between them.
  - Any candidates **skipped** as duplicates (and which existing bead they matched).
  - Any failures or warnings from `bd`.
