icon: play
name: Start working on ready
menus: prompts, beadsList
description: Review ready (not-in-progress) beads, present a prioritized recommendation, claim the chosen one, then analyze and plan it in this conversation and dispatch the implementation work to child conversations
backgroundColor: '#B2DFDB'
group: Tasks
enabledWhen: '!Session.IsChild && CommandExists("bd") && DirExists(".beads") && Tools.HasPattern("mitto_conversation_*")'
periodic:
  mode: optional
  default: false
  trigger: onCompletion
  delay: 60
prompt: |
  ## Session Context

  Your session ID is `{{ .Session.ID }}` — use this as `self_id` for all `mitto_*` MCP tool calls.
  Available ACP servers: `{{ .ACP.AvailableText }}`
  {{- if .Children.AllText }}
  Existing children: `{{ .Children.AllText }}`
  {{- end }}

  # Beads: Start Work on a Bead

  Beads is a CLI issue tracker (`bd`). Issues are called "beads" and have IDs like `bd-xyz`.

  This prompt is a **launcher**: it finds a ready bead and claims it, then **plans and coordinates the work in this conversation**. It analyzes the bead here, produces an implementation plan, and dispatches the actual implementation work to **child conversations** — reusing a suitable existing child (such as a "Coder" child) when possible, or creating new ones. This conversation owns the analysis, planning, coordination, and progress/completion logging.

  ## Step 0 — Check for prior bead context

  Before doing anything else, review the current conversation history to check whether a specific bead has already been discussed (e.g., a bead ID like `bd-1234` was mentioned, its details were fetched, or it was previously selected).

  - If a bead **has** been discussed in this conversation:
    Use `mitto_ui_options(self_id: "{{ .Session.ID }}")` to ask the user whether to:
    - **Option 1**: `"Start working on [BEAD-ID]: [title]"` — if chosen, skip directly to Step 3 (claim) using that bead ID.
    - **Option 2**: `"Work on a different bead"` — if chosen, continue to Step 1.

  - If **no** bead has been previously discussed: skip this step and proceed directly to Step 1.

  ## Step 1 — Find ready work

  Run the following to discover claimable work (open beads with no active blockers):

  ```bash
  bd ready --json
  ```

  Filter the results to **exclude any bead whose `status` is already `in_progress`** — those are already being worked on and should not be presented. If `bd ready` returns nothing (or everything is filtered out), fall back to listing open, not-in-progress beads:

  ```bash
  bd list --status open --json
  ```

  If after filtering there are **no ready, not-in-progress beads**, inform the user that there is nothing to start and stop.

  To rank the beads well in the next step, also gather **dependency leverage** — which ready beads block other work. Use the dependency edges already present in the `bd ready --json` output where available, or inspect a specific bead with `bd show <bead-id> --json` (or `bd dep tree <bead-id>`) to see what depends on it. A bead that unblocks many other beads is high-leverage.

  Also identify any **epics or parent issues** among the candidates (issue type `epic`, or beads that have child beads). For each, fetch its children and the dependency relationships between them:

  ```bash
  bd show <epic-id> --children --json   # the epic's child beads
  bd dep tree <epic-id>                  # dependency edges within the epic
  ```

  Capture both **explicit** dependencies (a child `blocks` / `depends-on` another) and **implicit** ones (e.g., a child that sets up infrastructure, schema, or shared scaffolding that its siblings build on). You'll use this in the next step to order the epic's children and pick the one to start with.

  ## Step 2 — Prioritize and present the work

  Rank the available (ready, not-in-progress) beads using these ordered criteria, **highest priority first**:

  1. **Blocking dependencies** — beads that block other work rank highest. The more beads a ready bead unblocks (directly or transitively), the higher it goes, because completing it frees up the most downstream work.
  2. **Declared priority** — among beads with comparable blocking impact, prefer the tracker's declared priority: `critical` → `high` → `medium` → `low`.
  3. **Unblocked readiness** — beads with no dependencies that can be started immediately break any remaining ties.

  ### Decompose epics and parent issues first

  Before ranking, resolve any **epic or parent issue** in the candidate set down to a single workable child, using the child trees and dependency edges gathered in Step 1:

  1. **Map the dependency tree** of the epic's children — both explicit edges (`blocks` / `depends-on`) and the implicit ordering you inferred (e.g., a child that establishes schema, infrastructure, or shared scaffolding the others build on).
  2. **Determine the correct execution order** that respects those dependencies (a topological order: a child only comes after everything it depends on).
  3. **Select the first workable child** — the earliest child in that order that has **no unresolved blockers**. Among several equally-unblocked candidates, pick the highest-value one (highest declared priority, then highest blocking leverage over its siblings).
  4. **Represent the epic by that first child** in the ranked list — propose the child (annotated with its parent epic, e.g. `<child-id>: <title> (part of <epic-id>)`), **not** the epic itself.

  **Do not propose any child that is blocked by the selected first child** (directly or transitively) — those are not in a workable state yet and would only confuse the choice. They become candidates on a later run once the first child is done. Standalone (non-epic) beads are ranked normally alongside the epic-derived first child.

  First, **print the ranked list as a regular message** (not inside the options dialog). Lead with your **top recommendation**, then the full sorted list. Format each entry as:

  > **<bead-id>: <title>** (<priority level>) — <one-line rationale for its position>

  For an epic-derived child, annotate it so the user sees the relationship and why it comes first:

  > **<child-id>: <title>** (<priority level>, part of <epic-id>) — first workable child of the epic; unblocks <siblings it precedes>

  Then call `mitto_ui_options(self_id: "{{ .Session.ID }}", allow_free_text: true)` to let the user choose:

  - Make the **first option your top recommendation** (label it with the bead ID and title), followed by the remaining beads in ranked order.
  - Set `allow_free_text: true` so the user can **override your ranking** or name a different bead entirely.
  - If **exactly one bead** is available, present it as the single recommendation and confirm before proceeding (still allow free text).

  Use the user's selection (or free-text override) as the chosen bead for the next step.

  ## Step 3 — Claim the bead

  Atomically claim the selected bead so others know it is being worked on:

  ```bash
  bd update <bead-id> --claim
  ```

  This sets the assignee to you and the status to `in_progress` (idempotent if already claimed by you).

  ## Step 3b — Link this conversation to the chosen bead

  This conversation was launched without a linked beads issue. Now that you have claimed
  `<bead-id>`, link it to this conversation so the tracker and UI reflect what you are
  actually working on:

  ```
  mitto_conversation_update(self_id: "{{ .Session.ID }}", conversation_id: "self", beads_issue: "<bead-id>")
  ```

  ## Step 4 — Fetch full bead details

  Now that the bead is claimed, load everything about it so you can plan accurately — work through this **in this conversation**:

  ```bash
  bd show <bead-id> --long --json        # full fields, metadata, design, acceptance
  bd dep tree <bead-id>                   # dependency tree (blockers and what it blocks)
  bd show <bead-id> --children --json     # any child beads
  ```

  Analyze all gathered context thoroughly: understand the problem statement, scope, constraints, acceptance criteria, design notes, and any dependencies or prior discussion in notes/comments.

  ## Step 5 — Produce an implementation plan

  Create a structured plan with the following sections:

  ### Goal
  One-paragraph summary of what needs to be built or fixed, and why.

  ### Approach
  High-level technical approach: which components are affected, what design decisions are involved, and why this approach was chosen.

  ### Work Items
  A numbered list of concrete, independently executable tasks. Each task must have:
  - **Title**: short action-oriented name (e.g., "Add database migration for new column")
  - **What to do**: a focused description of the work
  - **Inputs / context needed**: what the task needs to know or have access to
  - **Definition of done**: how to verify the task is complete

  ### Open Questions & Risks
  - Any ambiguities in the bead that need clarification
  - Technical risks or unknowns
  - Dependencies on other beads or systems

  ## Step 6 — Present the plan and iterate

  Use `mitto_ui_options(self_id: "{{ .Session.ID }}", allow_free_text: true)` to show the plan summary and ask: "Does this plan look correct? Shall I proceed with dispatching the implementation work?"

  - If the user provides feedback or selects **No**: revise the plan and present it again. Repeat until the user explicitly approves.
  - If the user approves: proceed to Step 7.

  ## Step 7 — Dispatch implementation work to child conversations

  Keep the analysis and coordination **in this conversation**, but hand the actual implementation to children. Only parallelize work items that are **truly independent** (no shared files, no ordering dependency). Run trivial or tightly-coupled items inline here rather than dispatching a separate conversation for each.

  For each parallelizable work item in the approved plan, **reuse a suitable existing child when possible, otherwise create a new one**:

  1. **Reuse vs. create:**
     - Check the existing children listed above (`{{ .Children.AllText }}`). If one is **idle** (not currently running) and a good fit — for example a **"Coder"** child for implementation work in the same workspace — **reuse it** with
       `mitto_conversation_send_prompt_mitto(self_id: "{{ .Session.ID }}", conversation_id: "<existing-child-id>", prompt: "<worker prompt>")`.
     - Otherwise create a new conversation with `mitto_conversation_new_mitto(self_id: "{{ .Session.ID }}", ...)`:
       - `title`: the work item title prefixed with the bead ID (e.g., `"<bead-id> · Add database migration"`)
       - `beads_issue`: the chosen bead ID (links the worker conversation to this bead)
       - `acp_server`: choose from the available ACP servers listed above — prefer a faster/cheaper model for straightforward tasks, and a slower/more capable model for complex tasks that require deep reasoning

  2. The **worker prompt** (reused or new) must be **self-contained** and include:
     - The full bead ID, title, and description
     - The acceptance criteria from the bead
     - The specific work item title and description
     - The definition of done for this task
     - Any relevant context from the bead's design notes or dependencies
     - Instruction to report back using `mitto_children_tasks_report_mitto` when done

  3. Do **not** wait for each conversation before dispatching the next — dispatch all in parallel.

  ## Step 8 — Log work start on the bead

  Immediately after dispatching, record a progress comment in the bead's history so the tracker reflects that work has begun and where it is happening:

  ```bash
  bd comment <bead-id> "Started work. Plan: <N> work items. Dispatched to: <child titles / IDs> (reused: <which, if any>)."
  ```

  ## Step 9 — Wait for workers and synthesise

  Use `mitto_children_tasks_wait_mitto(self_id: "{{ .Session.ID }}", children_list: [...], task_id: "<bead-id>", timeout_seconds: 600)` to wait for the workers to report back. On timeout, retry the pending children with the **same `task_id`** (omit the prompt to avoid duplicates). Summarise the consolidated results to the user, and log a short progress comment for any notable milestone or blocker:

  ```bash
  bd comment <bead-id> "Progress: <what completed / what remains / blockers>."
  ```

  ## Step 10 — Log completion and close out

  Once the work is complete and verified, record a completion comment in the bead's history, then offer to close it:

  ```bash
  bd comment <bead-id> "Completed: <what was delivered, key changes, verification performed>."
  bd close <bead-id> --reason "<short summary of what was delivered>"
  ```

  After closing, clean up any finished child conversations that are no longer needed with `mitto_conversation_delete_mitto(self_id: "{{ .Session.ID }}", conversation_id: "<child-id>")`.

  ## Final step — Offer to delete this conversation

  The task is complete. Offer to tidy up so finished conversations do not accumulate.

  1. Ask the user whether to delete this conversation now, via
     `mitto_ui_options(self_id: "{{ .Session.ID }}", question: "All done — delete this conversation now?", timeout_seconds: 120)` with options:
     - **"Yes, delete it"**
     - **"No, keep it"**

  2. Honour the answer:
     - **Delete** → first notify the user (the deletion is deferred until your turn ends, so the
       message is delivered first) with
       `mitto_ui_notify_mitto(self_id: "{{ .Session.ID }}", title: "<short outcome>", message: "<one-line summary of what was done>", style: "success")`,
       then self-destruct with
       `mitto_conversation_delete_mitto(self_id: "{{ .Session.ID }}", conversation_id: "self")`.
     - **Keep** → leave the conversation in place.

  3. **On timeout** (no response): only delete this conversation if **all** of the following hold —
     it was **started by this prompt** (a dedicated conversation for this task, not an existing
     conversation you were invoked into), **no further action is expected from the user**, and
     **all the work was clearly completed**. If so, notify (as above) then self-destruct; otherwise
     leave the conversation untouched.

  If the `mitto_*` tools are unavailable, skip this step silently.
