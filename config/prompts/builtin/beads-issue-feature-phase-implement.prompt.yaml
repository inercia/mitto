icon: build
name: Feature — implement phase
menus: internal
parameters:
  - name: IssueID
    type: beadsId
    required: false
    description: The beads issue ID to implement
  - name: Commit
    type: text
    required: false
    description: If "true", commit the increment after this phase; otherwise leave changes staged for review
description: Internal phase-tier prompt — implement the feature per its plan and add the `implemented` label. Invoked by name from the feature-implementation driver; runs on the Coding tier.
group: Tasks
backgroundColor: '#C8E6C9'
preferredModels:
  - modelTag: Coding
prompt: |
  ## Session Context

  Your session ID is `{{ .Session.ID }}` — use this as `self_id` for all `mitto_*` MCP tool calls.

  # Feature Implementation — Implement Phase

  This is the **implement** stage of the label-encoded feature-implementation state
  machine (`planned` → `implemented` → `tested` → `verified`). It is normally invoked
  by name from the `Iterate implementing feature` driver (or by a list orchestrator),
  which selects this phase when the target bead carries `planned` but not yet
  `implemented`.

  {{ $target := "" -}}
  {{ if .Session.BeadsIssue }}{{ $target = .Session.BeadsIssue }}{{ else if .Args.IssueID }}{{ $target = .Args.IssueID }}{{ end -}}
  {{ $commit := eq .Args.Commit "true" -}}
  {{ if $target -}}
  The **target feature** for this phase is `{{ $target }}`{{ if .Session.BeadsIssue }} (from this conversation's linked beads issue){{ else }} (supplied as the `IssueID` argument){{ end }}.
  Commit-after-implement is **{{ if $commit }}enabled{{ else }}disabled{{ end }}** (`Commit` argument).
  {{- else -}}
  No target feature is resolvable (neither `.Session.BeadsIssue` nor an `IssueID`
  argument was supplied). Do not guess. Post a `mitto_ui_notify` explaining the missing
  target, then stop this phase without changing anything.
  {{- end }}

  {{ if $target -}}
  ## Step 1 — Load LIVE state

  Labels drift between runs. Load the bead's **current** state fresh:

  ```bash
  bd show {{ $target }} --json --include-comments
  ```

  Read its `labels` array and prior comments (especially the plan-phase `Plan:`
  comment recorded when `planned` was added — it tells you the approach and design
  decisions). If `implemented` is already present, this phase's work is already
  done — `bd comment` a note that the phase re-ran redundantly and stop **without**
  re-adding the label.

  **Important — this phase runs in its own periodic iteration.** Unlike a single
  long-lived session, each phase of this driver is a separate scheduled run, so any
  uncommitted work here would be lost between iterations unless committed now (see
  Step 3).

  ## Step 2 — Implement the feature

  This is a **scheduled, silent** phase (invoked by the driver's on-completion
  loop). Do **not** call `mitto_ui_options`, `mitto_ui_form`, or `mitto_ui_textbox` —
  decide autonomously; if something is genuinely unclear or unsolvable without user
  input, defer via **Step 4**.

  Write the code per the plan, in the **smallest coherent increment** that makes
  functional progress:

  - Follow the design decisions and approach recorded in the `Plan:` comment.
  - Match the surrounding style and conventions; do not refactor unrelated code.
  - Do not gold-plate — implement exactly what the plan and acceptance criteria call
    for; further increments (or the test/review phases) will build on this one.

  When the increment is **functionally complete** (it builds and does what it is meant
  to, even if tests/polish come in later phases), proceed to Step 3.

  ## Step 3 — Record, advance the label{{ if $commit }}, and commit{{ end }}

  ```bash
  bd comment {{ $target }} "Implementation: <what was built, files touched, any deviations from the plan and why>."
  bd update {{ $target }} --add-label implemented
  ```

  Only add the label after the comment is posted.

  {{ if $commit -}}
  Then commit the increment as a **single, focused commit** using the project's commit
  conventions and reference the bead ID in the message. Stage only the files changed
  for this increment — by path (`git add <file> ...`) — never `git add -A`, `git add .`,
  or `git commit -a`, since unrelated uncommitted changes may exist and must be left
  untouched:

  ```bash
  git add <file> ...
  git commit -m "feat({{ $target }}): <one-line summary>" -m "<body: what changed and why, reference {{ $target }}>"
  ```

  Do **not** push automatically — the driver / user decides when to push. Skip the
  commit if nothing changed.
  {{- else -}}
  Do **not** commit. Leave the implementation changes staged/unstaged for the user to
  review; the bead comment already records what changed.
  {{- end }}

  Then stop — the driver's next scheduled run will observe `implemented` and dispatch
  the test phase.
  {{- end }}

  ## Step 4 — Blocked → Defer + Handoff

  Use this whenever this phase cannot make progress autonomously. **Do not** advance
  the `implemented` label. Instead:

  1. Defer and flag the bead so it drops out of `bd ready`:

     ```bash
     bd update {{ if $target }}{{ $target }}{{ else }}<target-feature>{{ end }} --add-label needs-human --defer <when>
     ```

  2. Write a structured handoff comment:

     ```bash
     bd comment {{ if $target }}{{ $target }}{{ else }}<target-feature>{{ end }} "Blocked at implement. What I tried: <summary>. What I need from you: <the ONE concrete question/decision/info/action>. How to resume: bd update <id> --remove-label needs-human --defer '' , then re-run."
     ```

  3. End with a concise handoff message naming the blocker and the single thing
     needed, and disable the enclosing conversation's periodic flag so the driver
     loop does not spin on the blocker:

     ```
     mitto_conversation_update(self_id: "{{ .Session.ID }}", conversation_id: "self", periodic_enabled: false)
     ```

  ## Guidelines

  - **One stage only.** This phase advances at most one label (`implemented`). Do not
    write tests or self-review — those are separate phases.
  - **Commit to persist across iterations.** Each phase runs in a separate periodic
    iteration; without `Commit: "true"`, work here is only as durable as the
    conversation's working tree.
  - **Live state only.** Always re-read labels via `bd show --json` at the start of
    the phase; never assume labels from a prior run.
  - **Always log to the tracker** with `bd comment` so progress is auditable.
