icon: globe
name: 'GitHub: sync tasks'
menus: prompts
description: Periodically pull GitHub issues from the project's repository into local beads issues
backgroundColor: '#B3E5FC'
group: GitHub
tags:
- periodic
- github
enabledWhen: FileExists(".git/config") && (Tools.HasPattern("github_*") || CommandExists("gh")) && CommandExists("bd")
preferredModels:
  - "*haiku*"
  - "*flash*"
  - "*mini*"
  - "*sonnet*"
periodic:
  mode: optional
  default: true
  value: 1
  unit: days
  at: "09:00"
prompt: |
  Pull GitHub issues from this project's repository into local beads issues,
  keeping the beads copy in sync with changes made on GitHub (body, comments,
  labels, state). This is a **one-way pull** (GitHub → beads) for now; two-way
  sync may be added later. Run it **on demand** in a regular conversation, or
  schedule it to run periodically via `mitto_conversation_set_periodic` — it
  adapts its behaviour to whichever mode it is invoked in (see Interaction Mode).

  ## Session Context

  Your session ID is `{{ .Session.ID }}` — use this as `self_id` for all `mitto_*` MCP tool calls.

  Project user data (JSON):
  {{ .Session.UserDataJSON }}

  ## Interaction Mode
  {{- if and .Session.IsPeriodic (not .Session.IsPeriodicForced) }}

  **Silent mode** — a scheduled periodic run; the user is not watching.
  - Use **only** `mitto_ui_notify` — non-blocking notifications only.
  - Do **NOT** use `mitto_ui_options`, `mitto_ui_form`, or `mitto_ui_textbox`.
  {{- else }}

  **Interactive mode** — a regular conversation or a force-triggered periodic run; the user is present.
  - Use interactive tools (`mitto_ui_options`, `mitto_ui_form`, `mitto_ui_textbox`) as well as `mitto_ui_notify`. This is the default when run on demand.
  {{- end }}

  ## Step 1 — Read optional config from project user data

  Inspect the **Project user data** JSON above (an array of `{"name", "value"}` objects). Two attributes are recognised (both optional, matched case-insensitively):

  - **"GitHub Repo"** — forces a specific repository as `owner/name` (use this for forks or when the local remote is not the canonical source). If absent, the repo is auto-detected.
  - **"GitHub Tasks"** — a GitHub issue filter that scopes which issues to mirror (e.g. `label:bug`, `assignee:@me`, `milestone:"v2"`, or a full search query). If absent, default to **all open issues**.

  ## Step 2 — Determine the target repository

  If "GitHub Repo" was provided, use it. Otherwise auto-detect from the local clone:

  ```bash
  gh repo view --json nameWithOwner -q .nameWithOwner
  ```

  Confirm `gh` is authenticated (`gh auth status`); if not, in interactive mode tell the user and stop, in periodic mode notify and stop. Hold the resulting `owner/name` as `<repo>`.

  ## Step 3 — Ensure beads is ready

  ```bash
  ls -d .beads 2>/dev/null
  ```

  - If `.beads` exists: continue.
  - If it does **not** exist: in interactive mode run `bd init --non-interactive`; in periodic mode notify and **stop** (do not initialise unattended).

  ## Step 4 — Fetch matching GitHub issues

  List the issues (PRs are excluded automatically). Apply the "GitHub Tasks" filter if present; otherwise list open issues. Page through all of them — do not truncate (raise `--limit`).

  ```bash
  gh issue list --repo <repo> --state open <filter flags> \
    --json number,title,body,state,labels,assignees,updatedAt,url --limit 500
  ```

  The issue `url` (e.g. `https://github.com/<repo>/issues/42`) is the stable join key. For each issue capture: number, title, body, state, labels (`.name`), assignees, `updatedAt`, and `url`.

  ## Step 5 — Load existing synced beads

  Synced beads carry the label `github-sync` and `external_ref = "<issue url>"`. Load them in one query:

  ```bash
  bd list --all --label github-sync --json
  ```

  Build a map from issue `url` → bead via each bead's `external_ref`. For each bead note its `metadata` (`github_updated`, `github_synced_comments`), `priority`, `status`, `issue_type`, `title`, and `description`.

  ## Step 6 — Pull each issue (create or update)

  Derive type and priority from the issue's labels (be tolerant of separators like `bug`, `type::bug`, `type/bug`):

  - **Type** → `bug` / `feature` (also `enhancement`) / `epic` / `chore`; otherwise `task`.
  - **Priority** → critical|urgent|p0→0, high|p1→1, medium|p2→2 (**default**), low|p3→3, trivial|p4→4.

  Compose a canonical bead **body** for every issue (write it to a temp file, pass via `--body-file`):

  ```
  **GitHub:** <repo>#<number> — <state> · assignees: <assignees> · labels: <labels>
  **Link:** <issue url>

  <the issue body (Markdown)>
  ```

  **A. No matching bead exists** → create it:

  ```bash
  bd create "[#<number>] <title>" \
    --type <mapped-type> --priority <mapped-priority> \
    --labels "github-sync" --external-ref "<issue url>" \
    --body-file /tmp/gh-<number>.md
  bd update <id> --set-metadata github_updated="<updatedAt>" --set-metadata github_synced_comments="<csv of comment ids>"
  ```

  **B. A matching bead exists** → detect changes and update:

  - If the bead's `metadata.github_updated` **equals** the issue's `updatedAt` **and** no new comments exist: **skip** (no change since last sync).
  - Otherwise update only what changed:

  ```bash
  bd update <id> --title "[#<number>] <title>" \
    --priority <mapped-priority> --type <mapped-type> \
    --body-file /tmp/gh-<number>.md --set-metadata github_updated="<updatedAt>"
  ```

  - **State reflection**: if the issue is `CLOSED` and the bead is still open, close it: `bd close <id> --reason "Closed on GitHub"`. (In interactive mode you may confirm first.)

  **C. Mirror new comments** (both create and update paths):

  Fetch full comments only for new/changed issues:

  ```bash
  gh issue view <number> --repo <repo> --json comments
  ```

  Each comment has a stable `id`, plus `author.login`, `createdAt`, and `body`. For each comment whose `id` is **not** in `metadata.github_synced_comments`, append it and extend the metadata list:

  ```bash
  bd comment <id> "[github] <author.login> @ <createdAt>: <comment body>"
  bd update <id> --set-metadata github_synced_comments="<previous ids + new ids>"
  ```

  ## Step 7 — Summary

  Report counts: issues matched, beads created, beads updated, comments mirrored, beads closed, unchanged (skipped).

  - Silent mode (scheduled periodic): send a single `mitto_ui_notify` only if anything changed; stay silent otherwise.
  - Interactive mode: print the full summary.

  ## Guidelines

  - **Pull-only**: never write back to GitHub (no comments, no edits, no state changes). Two-way sync is future work.
  - **Idempotent**: `external_ref` (the issue URL) is the join key; `metadata.github_updated` skips unchanged issues; `metadata.github_synced_comments` prevents duplicate comments. Running twice in a row must produce no spurious changes.
  - Prefer the `gh` CLI as shown; if only `github_*` MCP tools are available, use their equivalents for listing issues and fetching comments.
  - Always `--body-file` for descriptions and `--file`/inline text for comments to avoid shell-quoting issues.
  - Never delete beads for issues that fall out of the filter — they may simply no longer match.
