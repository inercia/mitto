icon: error
name: Fix CI
menus: prompts
description: Diagnose and fix CI pipeline failures
group: CI
backgroundColor: '#B2DFDB'
tags:
- periodic
- ci
prompt: |
  Check CI status and read failure logs before making changes. Do not speculate —
  read the logs and relevant source files.

  Diagnose and fix CI pipeline failures for the current branch.

  ## Session Context

  Your session ID is `{{ .Session.ID }}` — use this as `self_id` for all `mitto_*` MCP tool calls.

  ## Interaction Mode
  {{- if and .Session.IsPeriodic (not .Session.IsPeriodicForced) }}

  **Scheduled mode** — a periodic run; the user is not watching.
  - Use **only** `mitto_ui_notify` for all communication — non-blocking notifications only.
  - Do **NOT** use `mitto_ui_options`, `mitto_ui_form`, `mitto_ui_textbox`, or any
    interactive/blocking UI tool. They will stall an unattended run.
  - Act **autonomously**: diagnose and fix CI-failing issues, verifying locally
    (tests, build, lint) since you will **not** push.
  - When local verification passes (nothing left to fix), notify success and
    **stop iterating** so the loop doesn't spin:
    `mitto_conversation_update(self_id: "{{ .Session.ID }}", conversation_id: "self", periodic_enabled: false)`.
  - If a failure is ambiguous or needs a human decision (flaky test, infra outage,
    CI-config/dependency change), do not guess — notify and stop.
  {{- else }}

  **Interactive mode** — a force-triggered run or a non-periodic conversation; the user may be present.
  - You may use `mitto_ui_options`, `mitto_ui_form`, and other interactive tools in
    addition to `mitto_ui_notify`. Ask before risky changes (CI config, dependencies).
  {{- end }}

  Only fix CI-failing issues. Keep changes minimal.

  Fix root causes, not symptoms. If a test fails, fix the code or test based on
  which is actually wrong — no hard-coded workarounds. Report flawed tests/requirements
  rather than working around them.

  ### 1. Detect CI System

  | CI System | Detection Files |
  |-----------|-----------------|
  | GitHub Actions | `.github/workflows/*.yml` |
  | GitLab CI | `.gitlab-ci.yml` |
  | Jenkins | `Jenkinsfile` |
  | CircleCI | `.circleci/config.yml` |
  | Travis CI | `.travis.yml` |
  | Azure Pipelines | `azure-pipelines.yml` |

  If none found, inform user and stop.

  ### 2. Check CLI Tool

  | CI System | CLI | Auth Check |
  |-----------|-----|------------|
  | GitHub Actions | `gh` | `gh auth status` |
  | GitLab CI | `glab` | `glab auth status` |

  If not installed/authenticated: report, provide instructions, stop.

  ### 3. Get Status

  ```bash
  git branch --show-current
  gh run list --branch <branch> --limit 5    # GitHub
  glab ci status                              # GitLab
  ```

  If passing, report success and stop.
  {{- if and .Session.IsPeriodic (not .Session.IsPeriodicForced) }}
  In scheduled mode: also disable your own periodic so the loop stops
  (`mitto_conversation_update(self_id: "{{ .Session.ID }}", conversation_id: "self", periodic_enabled: false)`),
  then send a `mitto_ui_notify` success.
  {{- end }}

  ### 4. Diagnose

  ```bash
  gh run view <run-id> --log-failed    # GitHub
  glab ci view --log                    # GitLab
  ```

  Per failure:

  1. Quote exact error from logs
  2. Diagnose root cause: test failure, build error, lint/format, dependency, config/environment

  ### 5. Fix

  Per issue: implement fix, explain the change, verify locally (tests, build, lint).

  Fix in dependency order — causes before symptoms.

  #### Delegating Complex CI Fixes to Child Conversations

  When there are **3+ independent CI failures** in different areas (e.g., test failures in separate packages, a lint error AND a build error AND a test failure), delegate fixes to parallel child conversations.

  **Do NOT delegate** for: a single failure, cascading failures from one root cause, or simple lint/format fixes.

  {{- if and .Session.IsPeriodic (not .Session.IsPeriodicForced) }}
  In scheduled mode: before spawning, check `{{ .Children.AllText }}` and reuse an
  existing child for the same failure instead of duplicating. Spawn at most **3 per
  run**. **Spawned conversations must never be periodic** — they are one-off tasks.
  {{- end }}

  **Session context for delegation:**

  Your session ID is `{{ .Session.ID }}` — use as `self_id` for all `mitto_*` tool calls.

  Available ACP servers:
  {{ .ACP.AvailableText }}
  {{- if .Children.AllText }}

  Existing children:
  {{ .Children.AllText }}
  {{- end }}

  **How to delegate:**

  1. Group failures into independent fix tasks (no shared root cause, no overlapping files)
  2. Choose ACP server: straightforward fixes → prefer `"coding"`/`"fast"` servers; ambiguous failures needing investigation → prefer `"reasoning"`/`"planning"` servers; no match → server marked `(current)`, then first available
  3. If relevant children already exist, consider sending work to them via `mitto_conversation_send_prompt` instead of creating new ones
  4. `mitto_conversation_new(self_id: "{{ .Session.ID }}")` per task — include: the exact error log, relevant file paths, what to fix, constraints (minimal changes, fix root cause not symptoms), and reporting directive
  5. `mitto_children_tasks_wait(self_id: "{{ .Session.ID }}", task_id: "<ci-fix-description>", timeout_seconds: 600)`
  6. Review all results together — check for conflicts between fixes
  7. Verify combined changes locally: run full CI check (`make test` or equivalent)
  8. `mitto_conversation_delete` for completed children

  **Without Mitto tools**: fix all issues directly in sequence.

  ### 6. Report

  ```console
  ✅ Fixes applied. Push and monitor CI.
  To check: gh run watch / glab ci status
  If CI still fails, run this prompt again.
  ```

  ### 7. Commit and Push
  {{- if and .Session.IsPeriodic (not .Session.IsPeriodicForced) }}

  In scheduled mode: **commit** your fixes, but do **NOT push** — pushing is left to
  the user. Stage only the files you changed, explicitly by path (`git add <file> ...`);
  never `git add -A`/`.` or `git commit -a`. Skip the commit if nothing changed this
  run. Then `mitto_ui_notify` that fixes were committed and ask the user to push to
  re-run CI.
  {{- else }}

  Suggest the user commit and push the changes.
  {{- end }}

  ## Guidelines

  - Check CI status before attempting fixes
  - Modifying CI config or dependencies: in interactive mode get user approval; in
    scheduled mode do **not** make these changes — notify and stop instead
  - Report flaky tests as flaky rather than retrying blindly
  - Note infrastructure-related failures explicitly
  - Group related fixes in a single commit
  - **Interaction mode** (see "Interaction Mode" section above):
  {{- if and .Session.IsPeriodic (not .Session.IsPeriodicForced) }}
    - **Scheduled periodic**: notify-only; fix + commit (never push); verify locally;
      stop iterating when green; spawned children must never be periodic.
  {{- else }}
    - **Force-triggered or non-periodic**: you may use interactive UI; ask before
      risky changes; suggest commit + push at the end.
  {{- end }}
