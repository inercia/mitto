icon: check
name: Feature — test phase
menus: internal
parameters:
  - name: IssueID
    type: beadsId
    required: false
    description: The beads issue ID to test
  - name: Commit
    type: text
    required: false
    description: If "true", commit any test-related changes after this phase; otherwise leave changes staged for review
description: Internal phase-tier prompt — write/extend tests covering a feature's acceptance criteria and add the `tested` label. Invoked by name from the feature-implementation driver; runs on the Coding tier.
group: Tasks
backgroundColor: '#FFE0B2'
preferredModels:
  - modelTag: Coding
prompt: |
  ## Session Context

  Your session ID is `{{ .Session.ID }}` — use this as `self_id` for all `mitto_*` MCP tool calls.

  # Feature Implementation — Test Phase

  This is the **test** stage of the label-encoded feature-implementation state machine
  (`planned` → `implemented` → `tested` → `verified`). It is normally invoked by name
  from the `Iterate implementing feature` driver (or by a list orchestrator), which
  selects this phase when the target bead carries `implemented` but not yet `tested`.

  {{ $target := "" -}}
  {{ if .Session.BeadsIssue }}{{ $target = .Session.BeadsIssue }}{{ else if .Args.IssueID }}{{ $target = .Args.IssueID }}{{ end -}}
  {{ $commit := eq .Args.Commit "true" -}}
  {{ if $target -}}
  The **target feature** for this phase is `{{ $target }}`{{ if .Session.BeadsIssue }} (from this conversation's linked beads issue){{ else }} (supplied as the `IssueID` argument){{ end }}.
  Commit-after-test is **{{ if $commit }}enabled{{ else }}disabled{{ end }}** (`Commit` argument).
  {{- else -}}
  No target feature is resolvable (neither `.Session.BeadsIssue` nor an `IssueID`
  argument was supplied). Do not guess. Post a `mitto_ui_notify` explaining the missing
  target, then stop this phase without changing anything.
  {{- end }}

  {{ if $target -}}
  ## Step 1 — Load LIVE state

  Labels drift between runs. Load the bead's **current** state fresh:

  ```bash
  bd show {{ $target }} --json --include-comments
  ```

  Read its `labels`, acceptance criteria, and prior comments (especially the
  `Plan:` and `Implementation:` comments — they tell you the approach and what was
  built). If `tested` is already present, this phase's work is already done —
  `bd comment` a note that the phase re-ran redundantly and stop **without**
  re-adding the label.

  ## Step 2 — Write and run tests

  This is a **scheduled, silent** phase (invoked by the driver's on-completion
  loop). Do **not** call `mitto_ui_options`, `mitto_ui_form`, or `mitto_ui_textbox` —
  decide autonomously; if something is genuinely unclear or unsolvable without user
  input, defer via **Step 4**.

  Write or extend tests that cover the bead's **acceptance criteria**:

  - Use the project's existing test framework and conventions (mirror nearby tests).
  - Cover the behavior described in the plan/implementation, including realistic
    edge cases implied by the acceptance criteria.

  Run the **new** tests and the **full relevant suite** (the package(s) touched by the
  implementation, plus anything that depends on them) and keep iterating until **both**
  pass — do not stop at a partial pass. Capture the exact commands and passing output
  as evidence.

  ## Step 3 — Record, advance the label{{ if $commit }}, and commit{{ end }}

  ```bash
  bd comment {{ $target }} "Testing: <tests added/extended, command to run them, pass/fail evidence>."
  bd update {{ $target }} --add-label tested
  ```

  Only add the label after the comment is posted and all tests are green.

  {{ if $commit -}}
  Then commit the test changes as a **single, focused commit** using the project's
  commit conventions and reference the bead ID in the message. Stage only the files
  changed for this increment — by path (`git add <file> ...`) — never `git add -A`,
  `git add .`, or `git commit -a`, since unrelated uncommitted changes may exist and
  must be left untouched:

  ```bash
  git add <file> ...
  git commit -m "test({{ $target }}): <one-line summary>" -m "<body: what was tested and why, reference {{ $target }}>"
  ```

  Do **not** push automatically — the driver / user decides when to push. Skip the
  commit if nothing changed.
  {{- else -}}
  Do **not** commit. Leave the test changes staged/unstaged for the user to review;
  the bead comment already records what changed.
  {{- end }}

  Then stop — the driver's next scheduled run will observe `tested` and dispatch the
  review phase.
  {{- end }}

  ## Step 4 — Blocked → Defer + Handoff

  Use this whenever this phase cannot make progress autonomously (tests will not go
  green, coverage requires a decision only the user can make). **Do not** advance the
  `tested` label. Instead:

  1. Defer and flag the bead so it drops out of `bd ready`:

     ```bash
     bd update {{ if $target }}{{ $target }}{{ else }}<target-feature>{{ end }} --add-label needs-human --defer <when>
     ```

  2. Write a structured handoff comment:

     ```bash
     bd comment {{ if $target }}{{ $target }}{{ else }}<target-feature>{{ end }} "Blocked at test. What I tried: <summary>. What I need from you: <the ONE concrete question/decision/info/action>. How to resume: bd update <id> --remove-label needs-human --defer '' , then re-run."
     ```

  3. End with a concise handoff message naming the blocker and the single thing
     needed, and disable the enclosing conversation's periodic flag so the driver
     loop does not spin on the blocker:

     ```
     mitto_conversation_update(self_id: "{{ .Session.ID }}", conversation_id: "self", periodic_enabled: false)
     ```

  ## Guidelines

  - **One stage only.** This phase advances at most one label (`tested`). Do not
    self-review or close — the review phase runs next.
  - **Green before green label.** Never add `tested` while any new or existing
    relevant test is red.
  - **Commit to persist across iterations.** Each phase runs in a separate periodic
    iteration; without `Commit: "true"`, work here is only as durable as the
    conversation's working tree.
  - **Live state only.** Always re-read labels via `bd show --json` at the start of
    the phase; never assume labels from a prior run.
  - **Always log to the tracker** with `bd comment` so progress is auditable.
