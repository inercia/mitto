icon: search
name: Feature — review phase
menus: internal
parameters:
  - name: IssueID
    type: beadsId
    required: false
    description: The beads issue ID to review
  - name: Commit
    type: text
    required: false
    description: If "true", commit any review-driven changes after this phase; otherwise leave changes staged for review
description: Internal phase-tier prompt — self-review a feature against its acceptance criteria and add the `verified` label. Invoked by name from the feature-implementation driver; runs on the Reasoning tier.
group: Tasks
backgroundColor: '#D1C4E9'
preferredModels:
  - modelTag: Reasoning
prompt: |
  ## Session Context

  Your session ID is `{{ .Session.ID }}` — use this as `self_id` for all `mitto_*` MCP tool calls.

  # Feature Implementation — Review Phase

  This is the **review/verify** stage of the label-encoded feature-implementation state
  machine (`planned` → `implemented` → `tested` → `verified`). It is normally invoked
  by name from the `Iterate implementing feature` driver (or by a list orchestrator),
  which selects this phase when the target bead carries `tested` but not yet `verified`.

  {{ $target := "" -}}
  {{ if .Session.BeadsIssue }}{{ $target = .Session.BeadsIssue }}{{ else if .Args.IssueID }}{{ $target = .Args.IssueID }}{{ end -}}
  {{ $commit := eq .Args.Commit "true" -}}
  {{ if $target -}}
  The **target feature** for this phase is `{{ $target }}`{{ if .Session.BeadsIssue }} (from this conversation's linked beads issue){{ else }} (supplied as the `IssueID` argument){{ end }}.
  Commit-after-review is **{{ if $commit }}enabled{{ else }}disabled{{ end }}** (`Commit` argument).
  {{- else -}}
  No target feature is resolvable (neither `.Session.BeadsIssue` nor an `IssueID`
  argument was supplied). Do not guess. Post a `mitto_ui_notify` explaining the missing
  target, then stop this phase without changing anything.
  {{- end }}

  {{ if $target -}}
  ## Step 1 — Load LIVE state

  Labels drift between runs. Load the bead's **current** state fresh:

  ```bash
  bd show {{ $target }} --json --include-comments
  ```

  Read its `labels`, acceptance criteria, and prior comments (`Plan:`,
  `Implementation:`, `Testing:`). If `verified` is already present, this phase's work
  is already done — `bd comment` a note that the phase re-ran redundantly and stop
  **without** re-adding the label.

  ## Step 2 — Self-review

  This is a **scheduled, silent** phase (invoked by the driver's on-completion loop).
  Do **not** call `mitto_ui_options`, `mitto_ui_form`, or `mitto_ui_textbox` — decide
  autonomously; if something is genuinely unclear or unsolvable without user input,
  defer via **Step 4**.

  Check, concretely:

  - **Build** cleanly with no errors or new warnings.
  - **Vet/lint** clean (run the project's linter/vet tooling).
  - **Docs updated** where the change affects documented behavior, config, or APIs.
  - **Acceptance criteria satisfied** — walk each criterion on the bead and confirm it
    is met by the implementation and tests.
  - **No downstream breakage** — callers, related tests, and configs that reference
    the changed code still work.

  If **any** gap is found, do **NOT** advance the `verified` label — this phase must
  loop back rather than paper over the gap:

  - If you can fix it yourself (a small correction, a missing doc update, a lint
    fix), fix it now and re-check.
  - If it requires re-implementing or re-testing a meaningful chunk of work, record
    the gap via `bd comment` and stop **without** advancing the label — the driver's
    next scheduled run will re-dispatch this same review phase (since `tested` is
    still present and `verified` is still absent) after work resumes, or defer via
    **Step 4** if the gap needs user input.

  ## Step 3 — Record, advance the label{{ if $commit }}, and commit{{ end }}

  When genuinely satisfied that every check above passes:

  ```bash
  bd comment {{ $target }} "Review: <build/lint/test results, acceptance criteria checklist, downstream impact checked>."
  bd update {{ $target }} --add-label verified
  ```

  Only add the label after the comment is posted.

  {{ if $commit -}}
  Then commit any review-driven changes as a **single, focused commit** using the
  project's commit conventions and reference the bead ID in the message. Stage only
  the files changed for this pass — by path (`git add <file> ...`) — never
  `git add -A`, `git add .`, or `git commit -a`, since unrelated uncommitted changes
  may exist and must be left untouched:

  ```bash
  git add <file> ...
  git commit -m "chore({{ $target }}): <one-line summary of the review fix-ups>" -m "<body: what changed and why, reference {{ $target }}>"
  ```

  Do **not** push automatically — the driver / user decides when to push. Skip the
  commit if nothing changed.
  {{- else -}}
  Do **not** commit. Leave any review-driven changes staged/unstaged for the user to
  review; the bead comment already records what changed.
  {{- end }}

  Optionally close the bead now that it is verified:

  ```bash
  bd close {{ $target }} --reason "<short summary of what was delivered>"
  ```

  Then stop — the driver's next scheduled run will observe `verified` and take its
  inline Done branch (self-terminate).
  {{- end }}

  ## Step 4 — Blocked → Defer + Handoff

  Use this whenever this phase cannot make progress autonomously (a gap needs a
  decision only the user can make, an external action is required). **Do not**
  advance the `verified` label. Instead:

  1. Defer and flag the bead so it drops out of `bd ready`:

     ```bash
     bd update {{ if $target }}{{ $target }}{{ else }}<target-feature>{{ end }} --add-label needs-human --defer <when>
     ```

  2. Write a structured handoff comment:

     ```bash
     bd comment {{ if $target }}{{ $target }}{{ else }}<target-feature>{{ end }} "Blocked at review. What I tried: <summary>. What I need from you: <the ONE concrete question/decision/info/action>. How to resume: bd update <id> --remove-label needs-human --defer '' , then re-run."
     ```

  3. End with a concise handoff message naming the blocker and the single thing
     needed, and disable the enclosing conversation's periodic flag so the driver
     loop does not spin on the blocker:

     ```
     mitto_conversation_update(self_id: "{{ .Session.ID }}", conversation_id: "self", periodic_enabled: false)
     ```

  ## Guidelines

  - **One stage only.** This phase advances at most one label (`verified`). Closing
    the bead here is optional; the driver's Done branch always self-terminates.
  - **Never rubber-stamp.** Any unmet check means the label must NOT advance — loop
    back or defer, never guess that it is "probably fine".
  - **Live state only.** Always re-read labels via `bd show --json` at the start of
    the phase; never assume labels from a prior run.
  - **Always log to the tracker** with `bd comment` so progress is auditable.
