icon: check
name: Close if issue completed
description: Check the conversation's beads issue and, if all its requirements are done, close it and self-destruct
menus: conversation
backgroundColor: '#C5E1A5'
group: Tasks
enabledWhen: session.hasBeadsIssue && commandExists("bd") && dirExists(".beads")
prompt: |
  ## Session Context

  Your session ID is `@mitto:session_id` — use this as `self_id` for all `mitto_*` MCP tool calls.

  # Beads: Close This Conversation's Issue If Completed

  Beads is a CLI issue tracker (`bd`). Issues are called "beads" and have IDs like `bd-xyz`.

  This conversation is linked to the bead `@mitto:beads_issue`. Your job is to determine, against the
  **actual work done in this conversation** and the **current state of the codebase**, whether
  everything that bead asked for is now finished. If — and only if — it is **fully** complete, close
  the bead and self-destruct this conversation. Otherwise, leave it open and report what remains.

  ## Step 1 — Load the bead's requirements

  Fetch everything the bead promises to deliver:

  ```bash
  bd show @mitto:beads_issue --long --json     # full description, acceptance criteria, design, metadata
  bd dep tree @mitto:beads_issue               # blockers and what it blocks
  ```

  Identify the concrete acceptance criteria. If none are listed, infer them from the description.

  ## Step 2 — Check what this conversation accomplished

  You already have the full context of what this conversation worked on — use it directly; do **not**
  ask for a summary. Cross-reference each acceptance criterion against **hard evidence**, not just the
  conversation narrative:

  - **Code changes**: confirm the files, symbols, APIs, UI, or config the bead describes actually
    exist and behave as required in the codebase right now. For a bug, confirm the defective path is
    gone or guarded.
  - **Commits / branches** referencing the bead:

    ```bash
    git log --oneline --all | grep -i "@mitto:beads_issue"
    ```

  - **Tests**: locate the tests covering the bead's behaviour. If they exist and are cheap to run,
    run the relevant ones and record the result. Treat missing or failing tests as **not done**.

  Mark each criterion: ✅ Done (with evidence) / ⚠️ Partial / ❌ Not done / ❓ Unknown.

  ## Step 3 — Decide

  - **Fully complete** — every acceptance criterion is ✅ Done with concrete evidence and any
    relevant tests pass → proceed to Step 4 (close and clean up).
  - **Anything else** — any criterion is ⚠️ Partial, ❌ Not done, or ❓ Unknown, or there is active
    work still in flight → **do not close**. Be conservative: when evidence is ambiguous, treat the
    bead as still open.

  If not fully complete, post a short progress note so the finding is not lost, report what remains to
  the user, and **stop here** (do not run Step 4):

  ```bash
  bd comment @mitto:beads_issue "Reviewed for completion: <what is done> / <what remains>. Keeping open."
  ```

  ## Step 4 — Close the bead (only when fully complete)

  Close with a clear, specific, evidence-backed reason:

  ```bash
  bd close @mitto:beads_issue --reason "<what was delivered; key changes/commits; tests run and their result>"
  ```

  If the close command fails, report the error and stop — do not self-destruct.

  ## Step 5 — Notify and self-destruct

  This conversation existed to deliver `@mitto:beads_issue`, and that work is now complete and closed.
  Tidy up so the conversation list does not accumulate finished work:

  1. Notify the user of the outcome (so they still get feedback after the conversation disappears):

     `mitto_ui_notify_mitto(self_id: "@mitto:session_id", title: "Closed @mitto:beads_issue", message: "<one-line summary of what was delivered>", style: "success")`

  2. Self-destruct this conversation:

     `mitto_conversation_delete_mitto(self_id: "@mitto:session_id", conversation_id: "self")`

  The deletion is deferred until your turn finishes, so the notification is delivered first. If the
  delete tool is unavailable, skip this step silently.
