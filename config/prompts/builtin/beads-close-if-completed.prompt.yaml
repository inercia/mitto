icon: check
name: Close issue if completed
description: Check the conversation's linked beads issue and, if all its requirements are done, close it; otherwise explain why it cannot be closed
menus: conversation, prompts
backgroundColor: '#C5E1A5'
group: Tasks
enabledWhen: session.hasBeadsIssue && commandExists("bd") && dirExists(".beads")
prompt: |
  ## Session Context

  Your session ID is `{{ .Session.ID }}` — use this as `self_id` for all `mitto_*` MCP tool calls.

  # Beads: Close This Conversation's Issue If Completed

  Beads is a CLI issue tracker (`bd`). Issues are called "beads" and have IDs like `bd-xyz`.

  This conversation is linked to the bead `{{ .Session.BeadsIssue }}`. Determine whether that bead is
  already done. If it is fully complete, close it. If it cannot be closed yet, explain why and offer
  to open its details.

  ## Step 1 — Is the bead already closed?

  Load the bead's current state first:

  ```bash
  bd show {{ .Session.BeadsIssue }} --json
  ```

  If its `status` is already `closed`, there is **nothing else to do**. Notify the user and stop:

  `mitto_ui_notify_mitto(self_id: "{{ .Session.ID }}", title: "{{ .Session.BeadsIssue }} already closed", message: "This bead is already closed — nothing to do.", style: "info")`

  ## Step 2 — Load requirements and assess completion

  The bead is still open. Fetch everything it promises to deliver:

  ```bash
  bd show {{ .Session.BeadsIssue }} --long --json     # full description, acceptance criteria, design, metadata
  bd dep tree {{ .Session.BeadsIssue }}               # blockers and what it blocks
  ```

  Identify the concrete acceptance criteria. If none are listed, infer them from the description.
  Then cross-reference each criterion against **hard evidence** — the current state of the codebase
  and the work done in this conversation — not just narrative:

  - **Code changes**: confirm the files, symbols, APIs, UI, or config the bead describes actually
    exist and behave as required right now. For a bug, confirm the defective path is gone or guarded.
  - **Commits / branches** referencing the bead:

    ```bash
    git log --oneline --all | grep -i "{{ .Session.BeadsIssue }}"
    ```

  - **Tests**: locate the tests covering the bead's behaviour. If they exist and are cheap to run,
    run the relevant ones and record the result. Treat missing or failing tests as **not done**.
  - **Open blockers**: any unfinished blocker in the dep tree means the bead is **not done**.

  Mark each criterion: ✅ Done (with evidence) / ⚠️ Partial / ❌ Not done / ❓ Unknown.

  ## Step 3 — Decide

  - **Fully complete** — every acceptance criterion is ✅ Done with concrete evidence, no open
    blockers, and any relevant tests pass → go to Step 4 (close).
  - **Anything else** — any criterion is ⚠️ Partial, ❌ Not done, or ❓ Unknown, or there is active
    work still in flight → go to Step 5 (cannot close). Be conservative: when evidence is ambiguous,
    treat the bead as not done.

  ## Step 4 — Close the bead

  Close with a clear, specific, evidence-backed reason:

  ```bash
  bd close {{ .Session.BeadsIssue }} --reason "<what was delivered; key changes/commits; tests run and their result>"
  ```

  If the command fails, report the error and stop. On success, notify the user and stop:

  `mitto_ui_notify_mitto(self_id: "{{ .Session.ID }}", title: "Closed {{ .Session.BeadsIssue }}", message: "<one-line summary of what was delivered>", style: "success")`

  ## Step 5 — Cannot close: explain and offer details

  Do **not** close the bead. Show a confirmation dialog that explains concisely **why** it cannot be
  closed (which criteria remain, with the evidence you found) and offers to open its details:

  ```
  mitto_ui_options_mitto(self_id: "{{ .Session.ID }}",
    question: "{{ .Session.BeadsIssue }} can't be closed yet: <one-line reason>. What would you like to do?",
    options: [
      {label: "Open issue details", description: "Show the full bead and what still remains"},
      {label: "Leave it open", description: "Do nothing further"}
    ])
  ```

  - If the user picks **Open issue details**, run `bd show {{ .Session.BeadsIssue }} --long` and present the
    full bead alongside a per-criterion breakdown of what is done and what remains.
  - If the user picks **Leave it open**, record the finding so it is not lost, then stop:

    ```bash
    bd comment {{ .Session.BeadsIssue }} "Reviewed for completion: <what is done> / <what remains>. Keeping open."
    ```

  If the interactive tools are unavailable (e.g. an automated run), skip the dialog and instead report
  the same explanation — why it cannot be closed and what remains — as a normal message.
