##########################################################################################
# Builtin processor: injects session identity and context into the first message.
# This helps the AI agent understand its session context, parent/child relationships,
# and which ACP servers are available for the current workspace.
#
# Uses text-mode (no external command) with Go-template {{ }} accessors that are
# rendered at runtime against the live session context (.Session, .ACP, .Parent,
# .Children, .Workspace).
##########################################################################################
name: session-context
description: "Injects session identity and context into the first message"
enabled: true
when:
  on: userPrompt
  match: first
  rerun:
    afterTime: 30m
    afterSentMsgs: 20
    afterTokens: 80000
mutate: prepend
priority: 10
text: |
  [Session Context]
  Session: {{ .Session.ID }} ({{ .Session.Name }})
  Agent: {{ .ACP.Name }}
  Working Directory: {{ .Workspace.Folder }}
  Parent: {{ .Parent.Ref }}
  Children: {{ .Children.AllText }}
  Available Agents: {{ .ACP.AvailableText }}
  ---
