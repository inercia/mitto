##########################################################################################
# Builtin processor: generates and maintains Claude Code memory files for a workspace.
#
# On first run, dispatches a prompt to an auxiliary AI agent that explores the workspace
# and generates CLAUDE.md and/or .claude/rules/ files. On subsequent runs (every 15
# messages or 60K tokens), it reviews recent conversation history and updates the memory files with
# new patterns, conventions, and lessons learned.
#
# Fire-and-forget: the auxiliary agent works in the background while the main
# conversation continues normally.
#
# Disabled by default — enable per workspace in the Workspaces dialog or .mittorc.
# Only activates when the ACP server is Claude Code.
##########################################################################################
name: claude-manage-memory
description: "Generate and maintain Claude Code memory files from workspace analysis and conversations"
enabled: false
when: first
priority: 200
timeout: 300s
on_error: skip
rerun:
  afterSentMsgs: 15
  afterTokens: 60000

# Only for Claude Code sessions, skip periodic prompts
enabledWhen: 'acp.matchesServerType("claude-code") && !session.isPeriodic'

prompt: |
  You manage Claude Code memory files for this workspace.

  Working directory: @mitto:working_dir

  ## Memory File Locations

  - `./CLAUDE.md` or `./.claude/CLAUDE.md` - Project memory (shared)
  - `./.claude/rules/*.md` - Modular project rules
  - `./CLAUDE.local.md` - Personal preferences (not committed)

  ## If no memory files exist yet

  Explore the workspace and generate memory files:

  1. **Explore**: Read configs, entry points, tests, and key source files in parallel.
     Understand the project's purpose, tech stack, architecture, conventions, and patterns.

  2. **Choose format**:

     **Single file** (smaller projects): Create `./CLAUDE.md` with project overview,
     build/test commands, code style, and architecture.

     **Modular** (larger projects): Create `.claude/CLAUDE.md` for overview and
     `.claude/rules/*.md` for topic-specific rules.

  3. For `.claude/rules/*.md`, use YAML frontmatter with `paths` for conditional rules:

     ```markdown
     ---
     paths:
       - "src/api/**/*"
     ---
     # API Rules
     - All endpoints must include input validation
     ```

     Rules without `paths` load unconditionally.

  4. Keep files <200 lines each.

  ## If memory files already exist

  Review the recent conversation messages below and update memory files based on
  insights and lessons learned:

  1. Add new architectural patterns or components introduced
  2. Document new conventions, best practices, or anti-patterns discovered
  3. Update outdated or incomplete sections
  4. Add sections for uncovered areas
  5. Ensure examples reflect current codebase

  If no meaningful updates are needed, do nothing — do NOT modify any files.

  ## Size and Scope Control

  Memory files are loaded into every AI conversation, so bloated files waste context
  and degrade quality. Keep them lean.

  - **Hard limit**: Each individual file MUST stay under 150 lines. If a file grows
    beyond this, split it or aggressively trim.
  - **Total budget**: Aim for a single `CLAUDE.md` under 200 lines for small projects,
    or no more than ~10 files under `.claude/rules/` for large projects.
  - **Prune ruthlessly**: On every update, actively look for content to remove:
    - Outdated patterns that no longer match the codebase
    - Redundant entries that repeat information already in other files
    - Obvious guidance that any competent AI would follow without being told
    - Verbose examples that could be shortened without losing clarity
  - **Never duplicate docs**: If the project has its own documentation, reference it
    by path instead of copying content into memory files.
  - **Prefer bullet points and tables** over prose paragraphs.

  ## Content Guidelines

  - Be specific: "Use 2-space indentation" not "Format properly"
  - Show SHORT code examples demonstrating correct usage. Prefer snippets.
  - Use bullet points, group with headings
  - Include commands, examples, rationale
  - Include anti-pattern examples
  - Reference existing repo docs rather than duplicating

  === Recent Conversation ===

  Use the `mitto_conversation_history` MCP tool to retrieve the recent conversation.
  Call it with:
  - `self_id`: your session ID (from `mitto_conversation_get_current`)
  - `conversation_id`: "@mitto:session_id"
  - `event_types`: ["user_prompt", "agent_message"]
  - `last_n`: 30

  Review these messages for patterns, conventions, and lessons learned.

  ## Notification

  After completing your work, if you created or updated any memory files, call
  `mitto_ui_notify` with:
  - `self_id`: "@mitto:session_id"
  - `title`: "🧠 Memory Updated"
  - `message`: a brief summary, e.g. "Updated 2 memory files with new patterns"
  - `style`: "success"

  If no changes were needed, do NOT send any notification — stay completely silent.
