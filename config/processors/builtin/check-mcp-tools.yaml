##########################################################################################
# Builtin processor: checks if Mitto MCP tools are available and suggests installation.
#
# This processor appends a note asking the agent to verify MCP tool availability
# and show installation instructions if needed. It runs on the first message
# and re-runs periodically to re-check.
#
# Uses text-mode (no external command).
##########################################################################################
name: check-mcp-tools
description: "Checks if Mitto MCP tools are available and suggests installation"
enabled: true
enabledWhen: '!tools.hasPattern("mitto_*")'
when: first
position: append
priority: 15
rerun:
  afterTime: 20m
  afterSentMsgs: 15
text: |
  ---
  [Mitto MCP Tools Check]
  Check if Mitto's MCP tools are available. You should have access to
  tools like `mitto_ui_options`, `mitto_conversation_new`,
  `mitto_conversation_get_current`, etc.

  If these tools are NOT available, show the user instructions for adding
  Mitto's MCP server at http://127.0.0.1:5757/mcp, then proceed normally.
  Do NOT stop or refuse to work if the tools are missing.
