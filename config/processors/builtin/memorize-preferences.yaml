##########################################################################################
# Builtin processor: automatically extracts user preferences from conversations.
#
# This prompt-mode processor watches user messages for preferences, conventions,
# and how-they-want-things-done patterns. When it finds relevant preferences,
# it instructs an auxiliary AI agent to save them in a clearly delimited section
# of the AGENTS.md file in the workspace root.
#
# This is a fire-and-forget processor: the prompt is dispatched to a workspace-scoped
# auxiliary ACP session and the pipeline continues immediately without waiting.
#
# Enabled by default — disable in the Workspaces dialog or .mittorc if you want
# to turn off automatic preference tracking.
#
# What it captures:
#   - Code style preferences (naming, formatting, patterns)
#   - Process preferences (testing approach, review habits, commit style)
#   - Technology preferences (preferred libraries, tools, frameworks)
#   - Communication style (verbosity, format preferences)
#   - Project-specific conventions the user has expressed
#
# What it does NOT capture:
#   - Task-specific instructions (one-off requests)
#   - Bug reports or feature requests
#   - Questions or requests for information
#
# Housekeeping (garbage collection + compaction):
#   On every run it also tidies the existing preferences section so the list stays
#   short, durable, and relevant instead of growing forever. It removes stale entries
#   (one-off/completed work, superseded conventions, references to code that no longer
#   exists) and merges/tightens overlapping or near-duplicate entries. This is done
#   conservatively — when in doubt, an entry is kept.
##########################################################################################
name: memorize-preferences
description: "Extracts user preferences from conversations and saves them to AGENTS.md"
enabled: true
when:
  on: agentIdle
  match: all
  stopReasons: [end_turn]
  cadence:
    everyNTurns: 3
    everyNTokens: 8000
    afterInterval: 3m
priority: 200
timeout: 120s
on_error: skip

# Skip periodic prompts — only process real user messages
enabledWhen: '!Session.IsPeriodic'

prompt: |
  You are a preference curator. You maintain a concise, durable list of the user's
  preferences in the AGENTS.md file in the workspace root. You have TWO jobs on each
  run: (1) capture any NEW preferences from recent messages, and (2) keep the existing
  list clean by garbage-collecting stale entries and compacting related ones.

  ## 1. Capture new preferences

  Look for:
  - Code style preferences (naming conventions, formatting rules, design patterns)
  - Process preferences (how they want tests written, how they want commits done)
  - Technology preferences (preferred libraries, tools, approaches)
  - Communication preferences (level of detail, format they prefer)
  - Project-specific conventions they've explicitly stated

  Do NOT extract:
  - One-off task instructions (e.g., "fix this bug", "add this feature")
  - Questions or requests for information
  - Code snippets that are part of a task (not a preference)
  - Anything already captured in the existing preferences section

  ## 2. Housekeeping: garbage-collect and compact

  Review the EXISTING entries in the preferences section and tidy them up so the list
  stays short, durable, and generally-applicable instead of growing forever.

  Garbage-collect (REMOVE) an entry when it is clearly stale:
  - It references one-off or now-completed work (specific epics, PRs, issue IDs,
    branch names, or increment numbers like ".1.7") rather than a durable preference.
  - It is superseded or contradicted by a newer preference — keep only the latest.
  - It describes code, config, files, or features that no longer exist in the project.
  - It is so narrow or situational that it is unlikely to ever apply again.

  Compact (MERGE / TIGHTEN) entries when:
  - Two or more bullets cover the same topic/category — combine them into a single
    concise bullet that preserves the essential, still-relevant guidance.
  - Bullets are near-duplicates or heavily overlap — keep one clear version.
  - A bullet is verbose — tighten the wording without losing its meaning.

  Be conservative: when you are unsure whether an entry is still a genuine, durable
  preference, KEEP it. Never invent preferences, and never drop a clearly-valid one
  just to shorten the list. Preserve the user's intent and wording wherever it still
  applies.

  ## Writing the section

  Update the AGENTS.md file using EXACTLY this format (create the section if it is
  missing). Rewrite the WHOLE section with the cleaned-up result — i.e. the existing
  entries minus anything garbage-collected, with overlapping entries compacted, plus
  any new preferences appended:

  <!-- BEGIN USER PREFERENCES (auto-managed by memorize-preferences processor) -->
  ## User Preferences

  - **preference category**: description of preference
  - **another category**: description
  <!-- END USER PREFERENCES -->

  If the AGENTS.md file doesn't exist, create it with just this section.
  Read the existing entries first so you can dedupe, compact, and avoid duplicates.
  Only touch the content between the BEGIN/END USER PREFERENCES markers — never modify
  any other section of AGENTS.md.
  If there are NO new preferences AND nothing needs garbage-collecting or compacting,
  do nothing — do NOT modify any files.

  === User Messages ===

  Use the `mitto_conversation_history` MCP tool to retrieve recent user messages.
  Call it with:
  - `self_id`: your session ID (from `mitto_conversation_get_current`)
  - `conversation_id`: "@mitto:session_id"
  - `event_types`: ["user_prompt", "agent_message"]
  - `last_n`: 12

  Review these messages for user preferences and conventions.

  ## Notification

  After completing your work, if you changed AGENTS.md (added, removed, or compacted
  preferences), call `mitto_ui_notify` with:
  - `self_id`: "@mitto:session_id"
  - `title`: "📝 Preferences Updated"
  - `message`: a brief summary, e.g. "Added 1, removed 2 stale, merged 3"
  - `style`: "success"

  If nothing changed and no files were modified, do NOT send any notification — stay
  completely silent.
