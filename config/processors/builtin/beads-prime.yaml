##########################################################################################
# Builtin processor: injects beads memories (bd prime --memories-only) at the start of
# a conversation, so agents begin with project-specific knowledge pre-loaded.
#
# When the `bd` command is available AND the workspace contains a `.beads` directory
# (i.e. beads has been initialized for this project), this processor runs
# `bd prime --memories-only` and PREPENDS its output to the user's first message.
# The user's original message is always preserved.
#
# Activation conditions:
#   1. The `bd` command exists on PATH (CommandExists CEL gate)
#   2. The workspace contains a `.beads` directory (DirExists CEL gate)
#
# Throttling:
#   - Fires on the first message, then re-runs periodically to keep beads memories
#     fresh as the conversation grows, without injecting on every single message.
#
# Uses command-mode with outputFormat:raw so that the plain-text markdown output
# from `bd prime --memories-only` is injected directly without a JSON wrapper.
##########################################################################################
name: beads-prime
description: "Injects beads memories (bd prime --memories-only) at the start of a conversation"
enabled: true
enabledWhen: 'CommandExists("bd") && DirExists(".beads")'
when:
  on: userPrompt
  match: first
  rerun:
    afterTime: 30m
    afterSentMsgs: 20
    afterTokens: 80000
command: bd
args: [prime, --memories-only]
input: none
output: prepend
outputFormat: raw
priority: 92
timeout: 10s
